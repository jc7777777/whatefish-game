<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>你什么鱼鱼 - 网页版</title>
    <!-- PWA：添加到主屏后以全屏 App 模式运行（无浏览器界面）-->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
    <meta name="apple-mobile-web-app-title" content="你什么鱼鱼">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a2a4a">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url('BG005.jpg') center center / cover no-repeat;
            background-color: #0a2a4a;
            min-height: 100vh;
            min-height: 100dvh; /* 全屏时准确撑满，含刘海/底部安全区 */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 900px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(3px);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            text-align: center;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        .header h1 {
            color: white;
            font-size: 36px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            color: white;
            font-size: 18px;
            margin-top: 10px;
        }

        .game-board {
            flex: 1;
            position: relative;
            background: rgba(0, 100, 150, 0.3);
            border-radius: 15px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
            max-height: calc(100% - 40px);
            width: 105%;
            margin-left: -2.5%;
        }

        .card-slot {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 6px;
            padding: 8px;
            height: 233px;
            width: 70%;
            margin-left: auto;
            margin-right: auto;
            flex-shrink: 0;
            background: rgba(0, 80, 120, 0.4);
            border-radius: 15px;
            margin-bottom: 10px;
            border: 3px solid rgba(100, 200, 255, 0.5);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .slot-placeholder {
            width: 100%;
            height: 100%;
            background: rgba(100, 200, 255, 0.2);
            border: 2px dashed rgba(100, 200, 255, 0.6);
            border-radius: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            color: rgba(100, 200, 255, 0.5);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .slot-placeholder.matched {
            animation: matchPop 0.3s ease-out forwards;
        }

        .card {
            width: 98px;
            height: 81px;
            background: transparent;
            border-radius: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: none;
            margin: 0;
            user-select: none;
            border: none;
            position: relative;
            overflow: visible;
        }

        .card:hover {
            transform: scale(1.1);
        }

        .card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: brightness(0.7);
        }

        .card.matched {
            animation: matchPop 0.3s ease-out forwards;
        }

        @keyframes matchPop {
            0% { transform: scale(1) translate(0, 0); opacity: 1; }
            30% { transform: scale(1.2) translate(0, 0); opacity: 1; }
            60% { transform: scale(1.1) translate(var(--tx), var(--ty)); opacity: 1; }
            80% { transform: scale(0.9) translate(var(--tx), var(--ty)); opacity: 0.8; }
            100% { transform: scale(0) translate(var(--tx), var(--ty)); opacity: 0; }
        }

        /* 确保占位符在动画时保持原有尺寸 */
        .slot-placeholder {
            min-width: 0;
            min-height: 0;
        }

        .slot-placeholder.matched {
            animation: matchPop 0.4s ease-in-out forwards;
            /* 防止动画时影响其他元素的位置 */
            position: relative;
            z-index: 10;
        }

        .pile-card {
            position: absolute;
            cursor: pointer;
            transition: all 0.15s;
        }

        .pile-card:hover:not(.disabled) {
            transform: scale(1.1);
            z-index: 1000 !important;
        }

        .pile-card.disabled {
            pointer-events: none;
            filter: brightness(0.5);
        }

        .controls {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .btn {
            padding: 12px 18px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00a8cc 0%, #006994 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 105, 148, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 105, 148, 0.6);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
            border-radius: 15px;
        }

        .overlay.show {
            display: flex;
        }

        .overlay h2 {
            font-size: 36px;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .overlay .btn {
            margin-top: 20px;
        }

        .win-text {
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .lose-text {
            color: #ff6b6b;
        }

        .level {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }

        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .start-screen h1 {
            font-size: 45px;
            color: #ffd700;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .start-screen p {
            color: white;
            font-size: 20px;
            margin-bottom: 40px;
        }

        .start-btn {
            font-size: 28px;
            padding: 20px 60px;
            background: linear-gradient(145deg, #ffd700 0%, #ff8c00 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.6);
        }

        .game-hidden {
            display: none !important;
        }

        /* 榔头动画 */
        .hammer {
            position: fixed;
            font-size: 50px;
            z-index: 9999;
            pointer-events: none;
            transform-origin: bottom center;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        @keyframes hammerSmash {
            0% {
                transform: rotate(-30deg);
                opacity: 1;
            }
            40% {
                transform: rotate(45deg);
                opacity: 1;
            }
            60% {
                transform: rotate(30deg);
                opacity: 1;
            }
            100% {
                transform: rotate(45deg);
                opacity: 0;
            }
        }

        /* 槽位卡片落入颤动动画：6次弹跳，幅度逐渐衰减 */
        @keyframes slotBounce {
            0%   { transform: scale(1); }
            10%  { transform: scale(1.14); }
            20%  { transform: scale(0.92); }
            32%  { transform: scale(1.09); }
            44%  { transform: scale(0.95); }
            56%  { transform: scale(1.05); }
            67%  { transform: scale(0.97); }
            78%  { transform: scale(1.02); }
            88%  { transform: scale(0.99); }
            100% { transform: scale(1); }
        }
        .slot-bounce {
            animation: slotBounce 0.85s ease-out forwards;
        }

        /* 冰块破碎粒子 */
        .ice-particle {
            position: absolute;
            font-size: 20px;
            pointer-events: none;
            animation: iceShatter 0.5s ease-out forwards;
        }

        @keyframes iceShatter {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(0);
                opacity: 0;
            }
        }

        /* ── 卡槽烟雾粒子 ── */
        .smoke-puff {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(180,220,255,0.7) 0%, rgba(180,220,255,0) 70%);
            pointer-events: none;
            z-index: 9000;
            animation: smokePuff var(--dur, 1.1s) ease-out forwards;
        }
        @keyframes smokePuff {
            0%   { transform: translate(0, 0) scale(0.4); opacity: 0.8; }
            40%  { opacity: 0.55; }
            100% { transform: translate(var(--tx), var(--ty)) scale(var(--sc, 2.5)); opacity: 0; }
        }

        /* ── 碎冰颗粒 ── */
        .ice-shard {
            position: fixed;
            pointer-events: none;
            z-index: 9001;
            border-radius: 2px;
            background: var(--color, rgba(180, 230, 255, 0.9));
            box-shadow: 0 0 4px rgba(120,200,255,0.6);
            animation: iceShard var(--dur, 0.6s) ease-out forwards;
        }
        @keyframes iceShard {
            0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
            60%  { opacity: 0.8; }
            100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(0.2); opacity: 0; }
        }

        /* ── Loading 界面 ── */
        #loadingScreen {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 42, 74, 0.96);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            transition: opacity 0.5s ease;
        }
        #loadingScreen.visible {
            display: flex;
        }
        #loadingScreen.fadeout {
            opacity: 0;
            pointer-events: none;
        }
        .loading-fish-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-width: 320px;
        }
        .loading-fish-item {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
            position: relative;
            transition: background 0.3s;
        }
        .loading-fish-item img {
            width: 100%; height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .loading-fish-item.loaded img { opacity: 1; }
        .loading-fish-item.loaded { background: rgba(255,255,255,0.18); }
        .loading-title {
            color: #fff;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .loading-bar-wrap {
            width: 220px;
            height: 8px;
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
            overflow: hidden;
        }
        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4fc3f7, #81d4fa);
            border-radius: 4px;
            transition: width 0.25s ease;
        }
        .loading-pct {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Loading 界面 -->
    <div id="loadingScreen">
        <div class="loading-title">加载中…</div>
        <div class="loading-fish-row" id="loadingFishRow"></div>
        <div class="loading-bar-wrap"><div class="loading-bar" id="loadingBar"></div></div>
        <div class="loading-pct" id="loadingPct">0%</div>
    </div>

    <!-- 开始界面 -->
    <div class="start-screen" id="startScreen">
        <h1>🐠 你什么鱼鱼</h1>
        <p>消除鱼群，解锁图鉴，挑战更高关卡！</p>
        <button class="start-btn" onclick="startGame()">🎮 游戏开始</button>
    </div>

    <!-- 游戏容器 -->
    <div class="game-container game-hidden" id="gameContainer">
        <div class="header">
            <h1>🐠 你什么鱼鱼</h1>
            <div class="level" id="level">第 1 关</div>
            <div class="stats">
                <span>⏱️ <span id="time">28s</span></span>
                <span>🐠 <span id="moves">0</span></span>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <!-- 卡牌堆叠区域 -->
        </div>

        <div class="card-slot" id="cardSlot">
            <!-- 已选择的卡牌 -->
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="showCollection()">图鉴</button>
            <button class="btn btn-primary" onclick="restartGame()">重新开始</button>
            <button class="btn btn-primary" onclick="exitGame()">退出</button>
        </div>

        <!-- 胜利弹窗 -->
        <div class="overlay" id="winOverlay">
            <h2 class="win-text">🎉 恭喜过关！</h2>
            <p style="color: white; font-size: 18px;" id="winStats"></p>
            <button class="btn btn-primary" onclick="nextLevel()">下一关 ➡️</button>
        </div>

        <!-- 失败弹窗 -->
        <div class="overlay" id="loseOverlay">
            <h2 class="lose-text">😢 槽位满了</h2>
            <p style="color: white; font-size: 18px;">不要气馁，再试一次！</p>
            <button class="btn btn-primary" onclick="restartGame()">🔄 重新挑战</button>
        </div>

        <!-- 图鉴弹窗 -->
        <div class="overlay" id="collectionOverlay">
            <h2 style="color: #ffd700; font-size: 28px; margin-bottom: 15px;">🐠 我什么鱼鱼</h2>
            <div id="collectionContent" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-height: 50vh; overflow-y: auto; padding: 15px;"></div>
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
                <button class="btn btn-primary" onclick="saveCollectionImage()">💾 保存图鉴</button>
                <button class="btn btn-primary" onclick="hideCollection()">❌ 关闭</button>
            </div>
        </div>
    </div>

    <script>
        // 游戏配置
        const CARD_TYPES = ['🐠', '🐟', '🐡', '🦈', '🐳', '🦑', '🦐', '🦞', '🐙', '🦭', '🐚', '🐬', '🦛', '🐋', '🐸'];
        const CARD_WIDTH = 65;
        const CARD_HEIGHT = 85;

        // 第一关特殊鱼图片（来自PSD文件）
        // 第一关特殊鱼图片（来自PSD文件）- 使用Base64编码的图片
        const LEVEL1_SPECIAL_FISH = [
            { type: 'fish01', emoji: '🐟', name: '鱼1',  image: 'Fish_0001_small.png',  imageSelected: 'Fish_0001A_small.png' },
            { type: 'fish02', emoji: '🐠', name: '鱼2',  image: 'Fish_0002_small.png',  imageSelected: 'Fish_0002A_small.png' },
            { type: 'fish03', emoji: '🐡', name: '鱼3',  image: 'Fish_0003_small.png',  imageSelected: 'Fish_0003A_small.png' },
            { type: 'fish04', emoji: '🦑', name: '鱼4',  image: 'Fish_0004_small.png',  imageSelected: 'Fish_0004A_small.png' },
            { type: 'fish05', emoji: '🦐', name: '鱼5',  image: 'Fish_0005_small.png',  imageSelected: 'Fish_0005A_small.png' },
            { type: 'fish06', emoji: '🦞', name: '鱼6',  image: 'Fish_0006_small.png',  imageSelected: 'Fish_0006A_small.png' },
            { type: 'fish07', emoji: '🦈', name: '鱼7',  image: 'Fish_0007_small.png',  imageSelected: 'Fish_0007A_small.png' },
            { type: 'fish08', emoji: '🐳', name: '鱼8',  image: 'Fish_0008_small.png',  imageSelected: 'Fish_0008A_small.png' },
            { type: 'fish09', emoji: '🦭', name: '鱼9',  image: 'Fish_0009_small.png',  imageSelected: 'Fish_0009A_small.png' },
        ];
        const TIME_LIMIT_BASE = 28; // 第一关时间限制（秒）

        // 鱼类图鉴数据
        const FISH_COLLECTION = [
            { emoji: '⭐', name: '海星', rarity: '普通', color: '#8b8b8b' },
            { emoji: '🦀', name: '寄居蟹', rarity: '普通', color: '#8b8b8b' },
            { emoji: '🐙', name: '章鱼', rarity: '普通', color: '#8b8b8b' },
            { emoji: '🐠', name: '热带鱼', rarity: '普通', color: '#8b8b8b' },
            { emoji: '🐟', name: '小丑鱼', rarity: '普通', color: '#8b8b8b' },
            { emoji: '🐡', name: '河豚', rarity: '普通', color: '#8b8b8b' },
            { emoji: '🦈', name: '鲨鱼', rarity: '稀有', color: '#a8a8a8' },
            { emoji: '🐳', name: '蓝鲸', rarity: '稀有', color: '#a8a8a8' },
            { emoji: '🦑', name: '鱿鱼', rarity: '稀有', color: '#a8a8a8' },
            { emoji: '🦐', name: '大虾', rarity: '稀有', color: '#a8a8a8' },
            { emoji: '🦞', name: '龙虾', rarity: '史诗', color: '#ffd700' },
            { emoji: '🦭', name: '海豹', rarity: '史诗', color: '#ffd700' },
            { emoji: '🐚', name: '贝壳', rarity: '传说', color: '#ff69b4' },
            { emoji: '🐬', name: '海豚', rarity: '传说', color: '#ff69b4' },
            { emoji: '🦛', name: '海牛', rarity: '传说', color: '#ff69b4' },
            { emoji: '🐋', name: '巨鲸', rarity: '传说', color: '#ff69b4' },
            { emoji: '🐸', name: '蓝鳍金枪鱼', rarity: '神话', color: '#00ffff' },
        ];

        // 游戏状态
        let cards = [];
        let slotCards = [];
        let selectedCard = null;
        let moves = 0;
        let startTime = null;
        let timerInterval = null;
        let level = 1;
        let gameOver = false;
        let timeOut = false; // 是否超时失败
        let unlockedFish = []; // 已解锁的鱼类
        let isPaused = false; // 游戏是否暂停

        // 初始化游戏
        function initGame() {
            cards = [];
            slotCards = [];
            selectedCard = null;
            moves = 0;
            startTime = Date.now();
            gameOver = false;
            timeOut = false;

            document.getElementById('moves').textContent = '0';
            document.getElementById('winOverlay').classList.remove('show');
            document.getElementById('loseOverlay').classList.remove('show');

            // 重置失败弹窗文字
            document.querySelector('#loseOverlay h2').textContent = '😢 槽位满了';
            document.querySelector('#loseOverlay p').textContent = '不要气馁，再试一次！';

            document.getElementById('cardSlot').innerHTML = '';
            document.getElementById('gameBoard').innerHTML = '';

            // 生成卡牌
            generateCards();
            renderCards();

            // 启动计时器
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        // 生成卡牌
        function generateCards() {
            const board = document.getElementById('gameBoard');
            const boardWidth = board.offsetWidth - 20;
            const boardHeight = board.offsetHeight - 20;

            // 根据关卡增加难度
            const cardCount = level === 1 ? 15 : Math.min(24 + level * 6, 60);
            // 第一关至少 3 种牌
            const typesCount = Math.min(3 + Math.floor(level / 2), CARD_TYPES.length);

            // 确保总卡牌数是 3 的倍数
            const adjustedCardCount = Math.floor(cardCount / 3) * 3;

            // 生成卡牌组（确保每种类型都是 3 的倍数）
            let cardTypes = [];

            // 所有关卡使用PNG鱼图：第1关3种，每关+2种，最多9种
            {
                const fishCount = Math.min(3 + (level - 1) * 2, LEVEL1_SPECIAL_FISH.length);
                const tripletsTotal = adjustedCardCount / 3;
                const tripletsPerFish = Math.floor(tripletsTotal / fishCount);
                const extraTriplets = tripletsTotal % fishCount;
                for (let fishIdx = 0; fishIdx < fishCount; fishIdx++) {
                    const count = tripletsPerFish + (fishIdx < extraTriplets ? 1 : 0);
                    for (let j = 0; j < count * 3; j++) {
                        cardTypes.push(LEVEL1_SPECIAL_FISH[fishIdx].emoji);
                    }
                }
            }

            // 打乱
            cardTypes.sort(() => Math.random() - 0.5);

            // 创建卡牌对象并分层
            cards = cardTypes.map((type, index) => ({
                id: index,
                type: type,
                x: 0,
                y: 0,
                z: 0,
                disabled: false
            }));

            // 分层排列卡牌
        function arrangeCardsLayered() {
            const board = document.getElementById('gameBoard');
            const boardWidth = board.offsetWidth;
            const boardHeight = board.offsetHeight;

            let cardIndex = 0;
            const layers = Math.ceil(cards.length / 12);

            for (let layer = 0; layer < layers && cardIndex < cards.length; layer++) {
                const cardsInLayer = Math.min(12, cards.length - cardIndex);
                const layerOffset = layer * 8;

                // 计算每层的卡牌排列
                const rowsThisLayer = Math.ceil(cardsInLayer / 5);
                const colsThisLayer = Math.min(5, cardsInLayer);

                // 计算居中偏移
                const totalWidth = (colsThisLayer - 1) * 68 + CARD_WIDTH;
                const totalHeight = (rowsThisLayer - 1) * 62 + CARD_HEIGHT;
                const offsetX = Math.floor((boardWidth - totalWidth) / 2) - (level >= 2 ? 7 : 0);
                const offsetY = Math.floor((boardHeight - totalHeight) / 2);

                for (let row = 0; row < rowsThisLayer && cardIndex < cards.length; row++) {
                    for (let col = 0; col < 5 && cardIndex < cards.length; col++) {
                        if (cardIndex >= cards.length) break;

                        cards[cardIndex].x = offsetX + col * 68 + layerOffset;
                        cards[cardIndex].y = offsetY + row * 62 + layerOffset;
                        cards[cardIndex].z = layer;

                        cardIndex++;
                    }
                }
            }

            // 计算每张卡牌是否被遮挡
            updateCardDisabled();
        }

        // 更新卡牌遮挡状态
        function updateCardDisabled() {
            for (let i = 0; i < cards.length; i++) {
                const card = cards[i];
                card.disabled = false;

                // 检查是否有更高层的卡牌遮挡
                for (let j = 0; j < cards.length; j++) {
                    if (i === j) continue;
                    const other = cards[j];

                    if (other.z > card.z) {
                        const overlapX = Math.abs(other.x - card.x) < CARD_WIDTH * 0.7;
                        const overlapY = Math.abs(other.y - card.y) < CARD_HEIGHT * 0.7;

                        if (overlapX && overlapY) {
                            card.disabled = true;
                            break;
                        }
                    }
                }
            }
        }

        // 渲染卡牌
        function renderCards() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';

            // 按 y 坐标（行）和 x 坐标（列）对卡牌进行分组排序
            // 同一行的卡牌，x 越小（越靠左）的 z-index 越高，这样左边的可以盖住右边的
            const sortedCards = [...cards].sort((a, b) => {
                if (Math.abs(a.y - b.y) < CARD_HEIGHT * 0.5) {
                    // 同一行，按 x 排序（左边在前，z-index 更高）
                    return a.x - b.x;
                }
                // 不同行，按 y 排序
                return a.y - b.y;
            });

            // 为每张卡牌计算渲染时的 z-index
            // 基础层级来自 card.z，同一行内从左到右递增
            const cardRenderZ = new Map();
            sortedCards.forEach((card, index) => {
                // 同一行内，每向右移动一张，z-index 增加 1
                cardRenderZ.set(card.id, card.z * 100 + index);
            });

            cards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card pile-card';
                cardEl.id = `card-${card.id}`;
                cardEl.style.width = `${CARD_WIDTH}px`;
                cardEl.style.height = `${CARD_HEIGHT}px`;
                cardEl.style.left = `${card.x}px`;
                cardEl.style.top = `${card.y}px`;
                cardEl.style.zIndex = cardRenderZ.get(card.id);

                // 所有关卡使用PNG图片
                const fish = LEVEL1_SPECIAL_FISH.find(f => f.emoji === card.type);
                if (fish && fish.image) {
                    cardEl.innerHTML = `<img src="${fish.image}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;image-rendering: auto;" alt="${fish.name}">`;
                } else {
                    cardEl.textContent = card.type;
                }

                if (card.disabled) {
                    cardEl.classList.add('disabled');
                }

                cardEl.addEventListener('click', () => selectCard(card));
                board.appendChild(cardEl);
            });
        }

        function playHammerSound() {

            const osc = ctx.createOscillator();

            osc.connect(oscGain); oscGain.connect(ctx.destination);

            // 从 80Hz 急速上翘到 220Hz，产生"嘭↑"的上扬感
            osc.frequency.setValueAtTime(80, at);

            oscGain.gain.setValueAtTime(0.001, at);

            noiseGain.gain.exponentialRampToValueAtTime(0.001, at + 0.04);
            noise.start(at); noise.stop(at + 0.05);
        }

            src.connect(flt); flt.connect(g); g.connect(ctx.destination);
            g.gain.setValueAtTime(BGM_VOL * 0.35, at);
            src.start(at); src.stop(at+0.035);
            bgmScheduled.push(src);
        }
        // ── Jazz Ride Cymbal ──
        // 中频偏高的金属噪音，decay 比 closed hihat 更长，有"叮"的余音感
        function playRide(ctx, at) {
            const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.09), ctx.sampleRate);
            const d = buf.getChannelData(0);
            for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.35));
            const src = ctx.createBufferSource(); src.buffer = buf;
            const flt = ctx.createBiquadFilter();
            flt.type='bandpass'; flt.frequency.value=5500; flt.Q.value=0.7;
            const g = ctx.createGain();
            src.connect(flt); flt.connect(g); g.connect(ctx.destination);
            g.gain.setValueAtTime(BGM_VOL * 0.22, at);
            g.gain.exponentialRampToValueAtTime(0.001, at+0.08);
            src.start(at); src.stop(at+0.09);
            bgmScheduled.push(src);
        }

        // Rhodes 电钢琴（保留）
        function playRhodes(ctx, at, freq, dur, vol) {
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            const osc2 = ctx.createOscillator();
            const g2 = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc2.connect(g2); g2.connect(ctx.destination);
            osc.type = 'sine';
            osc2.type = 'triangle';
            osc.frequency.setValueAtTime(freq, at);
            osc2.frequency.setValueAtTime(freq * 2, at);
            g.gain.setValueAtTime(0, at);
            g.gain.linearRampToValueAtTime(BGM_VOL * 0.58 * vol, at + 0.012);
            g.gain.exponentialRampToValueAtTime(BGM_VOL * 0.18 * vol, at + dur * 0.5);
            g.gain.exponentialRampToValueAtTime(0.001, at + dur * 0.93);
            g2.gain.setValueAtTime(0, at);
            g2.gain.linearRampToValueAtTime(BGM_VOL * 0.1 * vol, at + 0.009);
            g2.gain.exponentialRampToValueAtTime(0.001, at + dur * 0.38);
            osc.start(at); osc.stop(at + dur);
            osc2.start(at); osc2.stop(at + dur * 0.4);
            bgmScheduled.push(osc); bgmScheduled.push(osc2);
        }

        // ── Dante Peluso 清亮电吉他 Lead Tone ──
        // 锯齿波 → 高通 (800Hz) → 薄身明亮感，模拟 clean electric guitar 单音
        // 配合 Rhodes 叠层，制造"吉他+电钢"的 80s indie 质感
        function playLeadGuitar(ctx, at, freq, dur, vol) {
            const osc = ctx.createOscillator();
            const filter = ctx.createBiquadFilter();
            const g = ctx.createGain();
            osc.connect(filter); filter.connect(g); g.connect(ctx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(freq, at);
            filter.type = 'highpass';
            filter.frequency.value = 800;
            filter.Q.value = 0.8;
            g.gain.setValueAtTime(0, at);
            g.gain.linearRampToValueAtTime(BGM_VOL * 0.22 * vol, at + 0.008);
            g.gain.exponentialRampToValueAtTime(BGM_VOL * 0.1 * vol, at + dur * 0.4);
            g.gain.exponentialRampToValueAtTime(0.001, at + Math.min(dur * 1.1, dur + 0.18));
            osc.start(at); osc.stop(at + dur + 0.2);
            bgmScheduled.push(osc);
        }

        // ── Dante Peluso 滑弦 slide-in ──
        // 从 slideFrom 频率快速滑入目标频率，模拟吉他 slide/legato
        function playSlide(ctx, at, slideFrom, targetFreq, vol) {
            const slideDur = 0.07;
            const osc = ctx.createOscillator();
            const filter = ctx.createBiquadFilter();
            const g = ctx.createGain();
            osc.connect(filter); filter.connect(g); g.connect(ctx.destination);
            osc.type = 'sawtooth';
            filter.type = 'highpass';
            filter.frequency.value = 700;
            filter.Q.value = 0.6;
            osc.frequency.setValueAtTime(slideFrom, at);
            osc.frequency.linearRampToValueAtTime(targetFreq, at + slideDur);
            g.gain.setValueAtTime(0, at);
            g.gain.linearRampToValueAtTime(BGM_VOL * 0.16 * vol, at + 0.01);
            g.gain.exponentialRampToValueAtTime(0.001, at + slideDur + 0.04);
            osc.start(at); osc.stop(at + slideDur + 0.05);
            bgmScheduled.push(osc);
        }

        // 装饰音（倚音）：主音前 50ms 快速划过
        function playGrace(ctx, at, graceFreq, mainFreq) {
            const dur = 0.05;
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(graceFreq, at - dur);
            osc.frequency.linearRampToValueAtTime(mainFreq, at);
            g.gain.setValueAtTime(BGM_VOL * 0.3, at - dur);
            g.gain.linearRampToValueAtTime(0.001, at);
            osc.start(at - dur); osc.stop(at + 0.01);
            bgmScheduled.push(osc);
        }

        // 电吉他 muted strum（切音：短促锯齿+高通）
        function playMutedGuitar(ctx, at, chordNotes, vol) {
            chordNotes.forEach((freq, i) => {
                const staggerDelay = i * 0.012; // 各弦略微错开，像真的拨弦
                const osc = ctx.createOscillator();
                const flt = ctx.createBiquadFilter();
                const g = ctx.createGain();
                osc.connect(flt); flt.connect(g); g.connect(ctx.destination);
                osc.type = 'sawtooth';
                flt.type = 'bandpass';
                flt.frequency.value = 1600;
                flt.Q.value = 2.5;
                osc.frequency.setValueAtTime(freq, at + staggerDelay);
                // 极短包络：muted 感
                g.gain.setValueAtTime(0, at + staggerDelay);
                g.gain.linearRampToValueAtTime(BGM_VOL * 0.22 * vol, at + staggerDelay + 0.008);
                g.gain.exponentialRampToValueAtTime(0.001, at + staggerDelay + 0.07);
                osc.start(at + staggerDelay);
                osc.stop(at + staggerDelay + 0.08);
                bgmScheduled.push(osc);
            });
        }

        function scheduleBgmLoop(startAt) {
            if (!bgmPlaying) return;
            const ctx = audioCtx;

            // 计算总循环拍数（A+B段）
            const totalMelodyBeats = melodyA.reduce((s,[,b])=>s+b,0) + melodyB.reduce((s,[,b])=>s+b,0);

            // ── 和弦 pad + 电吉他切音 ──
            let tc = startAt;
            let chordBeat = 0;
            while (chordBeat < totalMelodyBeats) {
                const chord = chordProg[Math.floor(chordBeat / 4) % chordProg.length];
                const dur = chord.beats * B;

                // Pad 铺底（正弦，低通，柔和）
                chord.notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const flt = ctx.createBiquadFilter();
                    const g = ctx.createGain();
                    osc.connect(flt); flt.connect(g); g.connect(ctx.destination);
                    osc.type = 'sine';
                    flt.type = 'lowpass'; flt.frequency.value = 1100;
                    osc.frequency.setValueAtTime(freq, tc);
                    const ad = i * 0.05;
                    g.gain.setValueAtTime(0, tc + ad);
                    g.gain.linearRampToValueAtTime(BGM_VOL * 0.13, tc + ad + 0.07);
                    g.gain.setValueAtTime(BGM_VOL * 0.10, tc + dur * 0.78);
                    g.gain.linearRampToValueAtTime(0.001, tc + dur * 0.97);
                    osc.start(tc + ad); osc.stop(tc + dur);
                    bgmScheduled.push(osc);
                });

                // 电吉他切音（Qoopie 标志）
                guitarStrums.forEach(({o, v}) => {
                    const bt = tc + o * B;
                    if (bt < startAt + totalMelodyBeats * B)
                        playMutedGuitar(ctx, bt, chord.notes, v);
                });

                chordBeat += chord.beats;
                tc += dur;
            }

            // ── A段旋律（Rhodes + Lead吉他叠层 + 装饰音/滑音，Dante Peluso 风格）──
            let t = startAt;
            melodyA.forEach(([freq, beats, vol, grace, slide]) => {
                const dur = beats * B;
                if (freq === 0) { t += dur; return; }
                if (grace > 0) playGrace(ctx, t, grace, freq);
                if (slide > 0) playSlide(ctx, t - 0.06, slide, freq, vol);
                playRhodes(ctx, t, freq, dur, vol);
                playLeadGuitar(ctx, t, freq, dur, vol * 0.7);   // 吉他叠层，稍轻
                t += dur;
            });

            // ── B段旋律（稍亮，大跳高潮时 Lead吉他更突出）──
            melodyB.forEach(([freq, beats, vol, grace, slide]) => {
                const dur = beats * B;
                if (freq === 0) { t += dur; return; }
                if (grace > 0) playGrace(ctx, t, grace, freq);
                if (slide > 0) playSlide(ctx, t - 0.06, slide, freq, vol);
                playRhodes(ctx, t, freq, dur, vol * 1.05);
                playLeadGuitar(ctx, t, freq, dur, vol * 0.85);  // B段吉他更突出

                t += dur;
            });
            const loopDuration = t - startAt;

            // ── Jazz Walking Bass（正弦+三角叠加，upright bass 质感）──
            let tb = startAt;
            const bassLoopSec = BASS_LOOP_BEATS * B;
            const bassReps = Math.ceil(loopDuration / bassLoopSec);
            for (let rep = 0; rep < bassReps; rep++) {
                bassLine.forEach(([freq, beats]) => {
                    if (tb >= startAt + loopDuration) return;
                    const dur = beats * B;
                    if (freq === 0) { tb += dur; return; }
                    // 正弦基音
                    const osc = ctx.createOscillator();
                    const g = ctx.createGain();
                    osc.connect(g); g.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, tb);
                    g.gain.setValueAtTime(0, tb);
                    g.gain.linearRampToValueAtTime(BGM_VOL * 0.9, tb + 0.012);
                    g.gain.exponentialRampToValueAtTime(BGM_VOL * 0.32, tb + dur * 0.4);
                    g.gain.exponentialRampToValueAtTime(0.001, tb + dur * 0.85);
                    osc.start(tb); osc.stop(tb + dur);
                    bgmScheduled.push(osc);
                    // 三角泛音（2倍频，轻柔，增加温润感）
                    const osc2 = ctx.createOscillator();
                    const g2 = ctx.createGain();
                    osc2.connect(g2); g2.connect(ctx.destination);
                    osc2.type = 'triangle';
                    osc2.frequency.setValueAtTime(freq * 2, tb);
                    g2.gain.setValueAtTime(0, tb);
                    g2.gain.linearRampToValueAtTime(BGM_VOL * 0.18, tb + 0.01);
                    g2.gain.exponentialRampToValueAtTime(0.001, tb + dur * 0.3);
                    osc2.start(tb); osc2.stop(tb + dur * 0.35);
                    bgmScheduled.push(osc2);
                    tb += dur;
                });
            }

            // ── 鼓组 ──
            const totalBeats = Math.ceil(loopDuration / B);
            for (let i = 0; i < totalBeats; i += DRUM_LOOP) {
                drumSeq.forEach(({t: type, o: offset}) => {
                    const bt = startAt + (i + offset) * B;
                    if (bt >= startAt + loopDuration) return;
                    if      (type === 'k')    playKick(ctx, bt);
                    else if (type === 'sd')   playSnare(ctx, bt);
                    else if (type === 'ch')   playClosedHihat(ctx, bt);
                    else if (type === 'oh')   playOpenHihat(ctx, bt);
                    else if (type === 'rim')  playRim(ctx, bt);
                    else if (type === 'ride') playRide(ctx, bt);
                });
            }

            bgmLoopTimeout = setTimeout(() => {
                scheduleBgmLoop(startAt + loopDuration + 1.3);
            }, (loopDuration - 0.25) * 1000);
        }

        function startBgm() {
            if (bgmPlaying) return;
            // 确保 AudioContext 已激活
            if (audioCtx.state === 'suspended') audioCtx.resume();
            bgmPlaying = true;
            bgmStartTime = audioCtx.currentTime + 0.1;
            scheduleBgmLoop(bgmStartTime);
        }

        function stopBgm() {
            bgmPlaying = false;
            clearTimeout(bgmLoopTimeout);
            bgmScheduled.forEach(node => {
                try { node.stop(); } catch(e) {}
            });
            bgmScheduled = [];
        }

        // ==============================

        // 显示榔头砸击动画
        function showHammer(x, y) {
            const hammer = document.createElement('div');
            hammer.className = 'hammer';
            hammer.innerHTML = `<img src="Hammer_small.png" style="width:50px;height:50px;object-fit:contain;transform:scaleX(-1);" alt="hammer">`;
            // 榔头直接出现在卡牌中心上方一点的位置
            hammer.style.left = (x - 25) + 'px';
            hammer.style.top = (y - 15) + 'px';
            hammer.style.animation = 'hammerSmash 0.25s ease-out forwards';

            document.body.appendChild(hammer);

            setTimeout(() => {
                if (hammer.parentNode) {
                    hammer.remove();
                }
            }, 250);
        }

        // 显示冰块破碎效果
        function showIceBreak(x, y) {
            const iceEmojis = ['🤍', '❄️', '🧊', '💠'];
            const particleCount = 12;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'ice-particle';
                particle.textContent = iceEmojis[Math.floor(Math.random() * iceEmojis.length)];
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.fontSize = '28px';
                particle.style.filter = 'brightness(1.8) saturate(0.3)';

                // 随机散开的方向和距离
                const angle = (Math.PI * 2 * i) / particleCount;
                const distance = 70 + Math.random() * 70;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                const rot = Math.random() * 360 - 180;

                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                particle.style.setProperty('--rot', rot + 'deg');

                document.body.appendChild(particle);

                setTimeout(() => {
                    if (particle.parentNode) {
                        particle.remove();
                    }
                }, 500);
            }
        }

        // 碎冰颗粒：在目标元素位置爆出 n 个冰碴四散飞出
        function spawnIceShards(el, n) {
            if (!el) return;
            const rect = el.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const colors = [
                'rgba(200,240,255,0.95)',
                'rgba(150,210,255,0.9)',
                'rgba(255,255,255,0.95)',
                'rgba(100,190,255,0.85)',
            ];
            for (let i = 0; i < n; i++) {
                const shard = document.createElement('div');
                shard.className = 'ice-shard';
                const angle = (Math.PI * 2 / n) * i + (Math.random() - 0.5) * 0.8;
                const dist = 50 + Math.random() * 80; // 放大飞出距离
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist - 10; // 略微上偏
                const rot = (Math.random() - 0.5) * 540;
                const dur = 0.45 + Math.random() * 0.3;
                const w = 8 + Math.random() * 12; // 放大宽度
                const h = 6 + Math.random() * 10; // 放大高度
                const color = colors[Math.floor(Math.random() * colors.length)];
                shard.style.cssText = `
                    left:${cx - w/2 + (Math.random()-0.5)*rect.width*0.5}px;
                    top:${cy - h/2 + (Math.random()-0.5)*rect.height*0.4}px;
                    width:${w}px; height:${h}px;
                    --color:${color};
                    --tx:${tx}px; --ty:${ty}px;
                    --rot:${rot}deg; --dur:${dur}s;
                    animation-delay:${i * 0.02}s;
                `;
                document.body.appendChild(shard);
                setTimeout(() => shard.remove(), (dur + i * 0.02 + 0.1) * 1000);
            }
        }

        // 烟雾粒子：在目标元素周围生成 n 个向上飘散的烟雾
        function spawnSmoke(el, n) {
            if (!el) return;
            const rect = el.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            for (let i = 0; i < n; i++) {
                const puff = document.createElement('div');
                puff.className = 'smoke-puff';
                // 随机起始偏移
                const ox = (Math.random() - 0.5) * rect.width * 0.7;
                const oy = (Math.random() - 0.5) * rect.height * 0.5;
                // 飘向：主要向上，略带横向随机
                const tx = (Math.random() - 0.5) * 40;
                const ty = -(20 + Math.random() * 40);
                const sc = 1.8 + Math.random() * 1.4;
                const dur = 0.8 + Math.random() * 0.5;
                const size = 8 + Math.random() * 10;
                puff.style.cssText = `
                    left:${cx + ox - size/2}px;
                    top:${cy + oy - size/2}px;
                    width:${size}px; height:${size}px;
                    --tx:${tx}px; --ty:${ty}px; --sc:${sc}; --dur:${dur}s;
                    animation-delay:${i * 0.06}s;
                `;
                document.body.appendChild(puff);
                setTimeout(() => puff.remove(), (dur + i * 0.06 + 0.1) * 1000);
            }
        }

        // 渲染槽位
        function renderSlot() {
            const slot = document.getElementById('cardSlot');
            slot.innerHTML = '';

            // 根据关卡确定槽位数量
            const currentSlotSize = level >= 5 ? 3 : 4;

            // 先渲染空槽位占位符
            for (let i = 0; i < currentSlotSize; i++) {
                const placeholder = document.createElement('div');
                placeholder.className = 'slot-placeholder';
                placeholder.dataset.index = i;
                slot.appendChild(placeholder);
            }

            // 渲染卡牌（替换占位符）
            slotCards.forEach((card, index) => {
                const placeholders = slot.querySelectorAll('.slot-placeholder');
                const targetPlaceholder = placeholders[index];

                if (targetPlaceholder) {
                    targetPlaceholder.style.background = 'transparent';
                    targetPlaceholder.style.border = 'none';
                    targetPlaceholder.style.color = 'black';

                    // 所有关卡使用图片
                    const fish = LEVEL1_SPECIAL_FISH.find(f => f.emoji === card.type);
                    if (fish && fish.image) {
                        // 使用A版本图片（选中状态）
                        const imageFile = fish.imageSelected || fish.image;
                        targetPlaceholder.innerHTML = `<img src="${imageFile}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;image-rendering: auto;" alt="${fish.name}">`;
                    } else {
                        targetPlaceholder.textContent = card.type;
                        targetPlaceholder.style.fontSize = '45px';
                        targetPlaceholder.style.fontWeight = '900';
                    }

                    // 最后落入的卡片触发颤动 + 烟雾
                    if (index === slotCards.length - 1) {
                        targetPlaceholder.classList.add('slot-bounce');
                        // 稍微延迟一帧再取位置，确保DOM已渲染
                        requestAnimationFrame(() => spawnSmoke(targetPlaceholder, 7));
                    }
                }
            });
        }

        // 检查匹配
        function checkMatch() {
            // 统计每种类型的数量
            const typeCount = {};
            slotCards.forEach(card => {
                typeCount[card.type] = (typeCount[card.type] || 0) + 1;
            });

            // 找到可以消除的类型
            const toRemove = [];
            for (const type in typeCount) {
                if (typeCount[type] >= 3) {
                    let count = 0;
                    for (let i = slotCards.length - 1; i >= 0; i--) {
                        if (slotCards[i].type === type) {
                            toRemove.push(i);
                            count++;
                            if (count >= 3) break;
                        }
                    }
                }
            }

            if (toRemove.length > 0) playMatchSound();
            // 消除匹配的卡牌（从后往前删除）
            toRemove.sort((a, b) => b - a);
            const placeholders = document.querySelectorAll('.slot-placeholder');

            // 获取卡槽区的中心点
            const cardSlot = document.getElementById('cardSlot');
            const slotRect = cardSlot.getBoundingClientRect();
            const centerX = slotRect.left + slotRect.width / 2;
            const centerY = slotRect.top + slotRect.height / 2;

            toRemove.forEach((index, i) => {
                const ph = placeholders[index];
                if (ph) {
                    // 获取当前卡牌的位置
                    const cardRect = ph.getBoundingClientRect();
                    const cardCenterX = cardRect.left + cardRect.width / 2;
                    const cardCenterY = cardRect.top + cardRect.height / 2;

                    // 计算到中心点的偏移量
                    const translateX = centerX - cardCenterX;
                    const translateY = centerY - cardCenterY;

                    // 设置自定义属性用于动画
                    ph.style.setProperty('--tx', translateX + 'px');
                    ph.style.setProperty('--ty', translateY + 'px');

                    ph.classList.add('matched');
                    // 碎冰颗粒，每张卡错开 60ms 爆出，更有层次感
                    setTimeout(() => spawnIceShards(ph, 12), i * 60);
                }
            });

            setTimeout(() => {
                toRemove.forEach(index => {
                    slotCards.splice(index, 1);
                });
                renderSlot();
                checkGameState();
            }, 400);
        }

        // 检查游戏状态
        function checkGameState() {
            // 检查是否胜利
            if (cards.length === 0 && slotCards.length === 0) {
                gameOver = true;
                clearInterval(timerInterval);

                // 解锁新鱼类
                // 第一关解锁前3种鱼（海星、寄居蟹、章鱼），其他关卡按关卡解锁
                const fishIndex = level === 1 ? Math.floor(Math.random() * 3) : Math.min(level - 1, FISH_COLLECTION.length - 1);
                if (!unlockedFish.includes(fishIndex)) {
                    unlockedFish.push(fishIndex);
                }

                // 更新胜利弹窗
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                const newFish = FISH_COLLECTION[fishIndex];
                document.getElementById('winStats').innerHTML =
                    `用时: ${minutes}:${seconds.toString().padStart(2, '0')} | 移动次数: ${moves}<br>
                    <span style="color: #ffd700; font-size: 20px;">✨ 解锁新鱼：${newFish.emoji} ${newFish.name} (${newFish.rarity})</span>`;
                document.getElementById('winOverlay').classList.add('show');
                stopBgm();
                playWinSound();
                return;
            }

            // 检查是否失败（槽位满了且没有可消除的）
            const currentSlotSize = level >= 5 ? 3 : 4;
            if (slotCards.length >= currentSlotSize) {
                const typeCount = {};
                slotCards.forEach(card => {
                    typeCount[card.type] = (typeCount[card.type] || 0) + 1;
                });
                const canMatch = Object.values(typeCount).some(count => count >= 3);
                if (!canMatch) {
                    gameOver = true;
                    clearInterval(timerInterval);
                    document.getElementById('loseOverlay').classList.add('show');
                    stopBgm();
                    playLoseSound();
                }
            }
        }

        // 更新计时器
        function updateTimer() {
            if (gameOver) return;
            const elapsed = Math.floor((Date.now() - startTime) / 1000);

            // 计算当前关卡的时间限制
            const timeLimit = Math.max(TIME_LIMIT_BASE - (level - 1), 10);

            // 检查时间限制
            if (elapsed >= timeLimit) {
                gameOver = true;
                timeOut = true;
                clearInterval(timerInterval);
                // 更新失败弹窗内容
                document.querySelector('#loseOverlay h2').textContent = '⏰ 时间已耗尽！';
                document.querySelector('#loseOverlay p').textContent = `${timeLimit}秒内完成挑战，再试一次！`;
                document.getElementById('loseOverlay').classList.add('show');
                stopBgm();
                playLoseSound();
                return;
            }

            // 显示倒计时
            const remaining = timeLimit - elapsed;
            document.getElementById('time').textContent =
                `${remaining.toString().padStart(2, '0')}s`;
            // 时间少于 5 秒时变红
            document.getElementById('time').style.color = remaining <= 5 ? '#ff6b6b' : 'white';
        }

        // 当前关卡需要加载的图片（在initGame中重新计算）
        let currentLevelImages = [];
        let currentLevelFishItems = {};

        // 加载当前关卡的资源
        function loadLevelResources(levelNum, onComplete) {
            const loadingScreen = document.getElementById('loadingScreen');
            loadingScreen.classList.add('visible');

            // 计算当前关卡用到的鱼
            const fishCount = Math.min(3 + (levelNum - 1) * 2, LEVEL1_SPECIAL_FISH.length);
            const currentFish = LEVEL1_SPECIAL_FISH.slice(0, fishCount);

            // 当前关卡需要预加载的所有图片
            const imagesToLoad = [
                ...currentFish.map(f => f.image),
                ...currentFish.map(f => f.imageSelected),
                'Hammer_small.png',
                'BG005.jpg'
            ];
            const total = imagesToLoad.length;
            let loaded = 0;

            // 构建 loading 鱼缩略图行
            const row = document.getElementById('loadingFishRow');
            row.innerHTML = ''; // 清空之前的
            const fishItems = {};
            currentFish.forEach(f => {
                const item = document.createElement('div');
                item.className = 'loading-fish-item';
                item.innerHTML = `<img src="${f.image}" alt="">`;
                row.appendChild(item);
                fishItems[f.image] = item;
            });
            currentLevelFishItems = fishItems;

            const bar = document.getElementById('loadingBar');
            const pct = document.getElementById('loadingPct');

            function onOne(src) {
                loaded++;
                const p = Math.round(loaded / total * 100);
                bar.style.width = p + '%';
                pct.textContent = p + '%';
                // 对应鱼图片亮起
                if (fishItems[src]) fishItems[src].classList.add('loaded');
                if (loaded >= total) onAllLoaded();
            }

            function onAllLoaded() {
                // 稍微停留 300ms 让用户看到 100%，再淡出
                setTimeout(() => {
                    loadingScreen.classList.add('fadeout');
                    setTimeout(() => {
                        loadingScreen.classList.remove('visible', 'fadeout');
                        row.innerHTML = ''; // 清理 DOM
                        onComplete();
                    }, 500);
                }, 300);
            }

            // 开始预加载
            imagesToLoad.forEach(src => {
                const img = new Image();
                img.onload = img.onerror = () => onOne(src);
                img.src = src;
            });
        }

        // 开始游戏（从开始界面）
        function startGame() {
            // 请求全屏（用户手势触发，浏览器允许）
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();

            playStartSound();

            // 隐藏开始界面
            document.getElementById('startScreen').style.display = 'none';

            // 加载第一关资源
            level = 1;
            loadLevelResources(level, () => {
                document.getElementById('gameContainer').classList.remove('game-hidden');
                setTimeout(() => startBgm(), 1500);
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => { initGame(); });
                });
            });
        }

        // 进入下一关
        function nextLevel() {
            // 隐藏胜利弹窗
            document.getElementById('winOverlay').classList.remove('show');

            level++;

            // 更新关卡显示
            document.getElementById('level').textContent = `第 ${level} 关`;

            // 加载下一关资源
            loadLevelResources(level, () => {
                // 重置游戏状态（包括gameOver）
                cards = [];
                slotCards = [];
                selectedCard = null;
                moves = 0;
                startTime = Date.now();
                gameOver = false;
                timeOut = false;

                document.getElementById('moves').textContent = '0';

                // 清空卡槽和卡牌
                document.getElementById('cardSlot').innerHTML = '';
                document.getElementById('gameBoard').innerHTML = '';

                // 生成新卡牌
                generateCards();
                renderCards();

                // 重置计时器
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(updateTimer, 1000);

                // 重新开始BGM
                setTimeout(() => startBgm(), 100);
            });
        }

        // 退出游戏：停止计时/BGM，退出全屏，返回开始界面
        function exitGame() {
            stopBgm();
            if (timerInterval) clearInterval(timerInterval);
            gameOver = true;
            // 退出全屏
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            // 返回开始界面
            document.getElementById('gameContainer').classList.add('game-hidden');
            document.getElementById('startScreen').style.display = '';
            // 重置关卡
            level = 1;
            unlockedFish = [];
        }

        // 重新开始
        function restartGame() {
            stopBgm();
            level = 1;
            unlockedFish = [];
            document.getElementById('level').textContent = `第 ${level} 关`;
            initGame();
            setTimeout(() => startBgm(), 100);
        }

        // 显示图鉴
        function showCollection() {
            const collectionContent = document.getElementById('collectionContent');
            collectionContent.innerHTML = '';

            // 检测屏幕宽度，决定列数
            const isMobile = window.innerWidth < 600;
            const columns = isMobile ? 3 : 3;

            FISH_COLLECTION.forEach((fish, index) => {
                const isUnlocked = unlockedFish.includes(index);
                const card = document.createElement('div');
                card.style.cssText = `
                    background: ${isUnlocked ? 'rgba(255, 255, 255, 0.9)' : 'rgba(0, 0, 0, 0.3)'};
                    border: 2px solid ${isUnlocked ? fish.color : '#555'};
                    border-radius: 8px;
                    padding: 8px;
                    text-align: center;
                    opacity: ${isUnlocked ? '1' : '0.5'};
                    filter: ${isUnlocked ? 'none' : 'grayscale(100%)'};
                `;

                card.innerHTML = `
                    <div style="font-size: ${isMobile ? '32px' : '144px'}; margin-bottom: 5px;">${isUnlocked ? fish.emoji : '❓'}</div>
                    <div style="font-size: ${isMobile ? '12px' : '16px'}; color: #333; font-weight: bold;">${isUnlocked ? fish.name : '???'}</div>
                    <div style="font-size: ${isMobile ? '10px' : '12px'}; color: ${fish.color}; margin-top: 3px;">${isUnlocked ? fish.rarity : '??? 级'}</div>
                `;

                collectionContent.appendChild(card);
            });

            // 暂停游戏
            if (!gameOver && timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                isPaused = true;
            }

            document.getElementById('collectionOverlay').classList.add('show');
        }

        // 隐藏图鉴
        function hideCollection() {
            document.getElementById('collectionOverlay').classList.remove('show');

            // 恢复游戏
            if (!gameOver && isPaused && !timeOut) {
                timerInterval = setInterval(updateTimer, 1000);
                isPaused = false;
            }
        }

        // 保存图鉴图片
        function saveCollectionImage() {
            // 只保存已解锁的鱼类
            const unlockedFishes = FISH_COLLECTION.filter((fish, index) => unlockedFish.includes(index));
            
            if (unlockedFishes.length === 0) {
                alert('你还没有解锁任何鱼类，快去玩游戏吧！');
                return;
            }
            
            // 创建一个临时 canvas 来绘制图鉴
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // 设置画布大小
            const padding = 40;
            const titleHeight = 80;
            const cols = 3;
            const rows = Math.ceil(unlockedFishes.length / cols);
            const cardWidth = 150;
            const cardHeight = 200;
            const gap = 20;
            
            const width = padding * 2 + cols * cardWidth + (cols - 1) * gap;
            const height = padding * 2 + titleHeight + rows * cardHeight + (rows - 1) * gap;
            
            canvas.width = width;
            canvas.height = height;
            
            // 绘制背景
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制边框
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 4;
            ctx.strokeRect(padding, padding, width - padding * 2, height - padding * 2);
            
    // 绘制标题
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 36px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🐠 我什么鱼鱼图鉴', width / 2, padding + 60);
            
            // 只绘制已解锁的图鉴卡片
            unlockedFishes.forEach((fish, index) => {
                const col = index % cols;
                const row = Math.floor(index / cols);
                
                const x = padding + col * (cardWidth + gap);
                const y = padding + titleHeight + row * (cardHeight + gap);
                
                // 绘制卡片背景
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.fillRect(x, y, cardWidth, cardHeight);
                
                // 绘制卡片边框
                ctx.strokeStyle = fish.color;
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, cardWidth, cardHeight);
                
                // 绘制 emoji
                ctx.font = '72px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(fish.emoji, x + cardWidth / 2, y + 100);
                
                // 绘制名字
                ctx.fillStyle = '#333';
                ctx.font = 'bold 16px Arial';
                ctx.fillText(fish.name, x + cardWidth / 2, y + 140);
                
                // 绘制稀有度
                ctx.fillStyle = fish.color;
                ctx.font = '14px Arial';
                ctx.fillText(fish.rarity, x + cardWidth / 2, y + 165);
            });
            
            // 转换为图片并下载
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = '你什么鱼鱼_我什么鱼鱼.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                alert('图鉴已保存到本地！');
            });
        }

        // 启动游戏（等待用户点击开始）
    </script>
</body>
</html>
