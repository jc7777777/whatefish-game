    <script>
        // 游戏配置
        const CARD_TYPES = ['🐠', '🐟', '🐡', '🦈', '🐳', '🦑', '🦐', '🦞', '🐙', '🦭', '🐚', '🐬', '🦛', '🐋', '🐸'];
        const CARD_WIDTH = 65;
        const CARD_HEIGHT = 85;

        // 检查所有图片是否加载完成的函数
        function waitForImagesToLoad() {
            const images = document.querySelectorAll('img[src^="Fish_"]');
            const promises = [];
            images.forEach(img => {
                if (!img.complete) {
                    promises.push(new Promise((resolve) => {
                        img.onload = resolve;
                        img.onerror = resolve;
                    }));
                }
            });
            return Promise.all(promises);
        }

        // 第一关特殊鱼图片（来自PSD文件）- 使用fish images2的新图片
        const LEVEL1_SPECIAL_FISH = [
            { type: 'fish01', emoji: '🐟', name: '鱼1',  image: 'Fish_0001_small.png' },
            { type: 'fish02', emoji: '🐠', name: '鱼2',  image: 'Fish_0002_small.png' },
            { type: 'fish03', emoji: '🐡', name: '鱼3',  image: 'Fish_0003_small.png' },
            { type: 'fish04', emoji: '🦑', name: '鱼4',  image: 'Fish_0004_small.png' },
            { type: 'fish05', emoji: '🦐', name: '鱼5',  image: 'Fish_0005_small.png' },
            { type: 'fish06', emoji: '🦞', name: '鱼6',  image: 'Fish_0006_small.png' },
            { type: 'fish07', emoji: '🦈', name: '鱼7',  image: 'Fish_0007_small.png' },
            { type: 'fish08', emoji: '🐳', name: '鱼8',  image: 'Fish_0008_small.png' },
            { type: 'fish09', emoji: '🦭', name: '鱼9',  image: 'Fish_0009_small.png' },
        ];
        const TIME_LIMIT_BASE = 28; // 第一关时间限制（秒）

        // 成就定义
        const ACHIEVEMENTS = {
            FIRST_LEVEL: { id: 'first_level', icon: '🏆', title: '新手上路', desc: '完成第1关' },
            TRIPLE_COMBO: { id: 'triple_combo', icon: '🔥', title: '三连击！', desc: '连续消除3次' },
            FIVE_COMBO: { id: 'five_combo', icon: '💥', title: '五连击！', desc: '连续消除5次' },
            TEN_COMBO: { id: 'ten_combo', icon: '🌟', title: '十连击！', desc: '连续消除10次' },
            FISH_COLLECTOR: { id: 'fish_collector', icon: '🐠', title: '鱼类收集者', desc: '解锁10种鱼' },
            SPEED_MASTER: { id: 'speed_master', icon: '⚡', title: '速通大师', desc: '3秒内完成一次消除' },
            PERSISTENT: { id: 'persistent', icon: '💪', title: '坚持不懈', desc: '失败5次后继续游戏' },
            PERFECT: { id: 'perfect', icon: '✨', title: '完美主义', desc: '连续3关零失误通关' },
        };

        // 鱼类图鉴数据
        const FISH_COLLECTION = [
            { emoji: '⭐', name: '海星', rarity: '普通', color: '#8b8b8b' },
            { emoji: '🦀', name: '寄居蟹', rarity: '普通', color: '#8b8b8b' },
            { emoji: '🐙', name: '章鱼', rarity: '普通', color: '#8b8b8b' },
            { emoji: '🐠', name: '热带鱼', rarity: '普通', color: '#8b8b8b' },
            { emoji: '🐟', name: '小丑鱼', rarity: '普通', color: '#8b8b8b' },
            { emoji: '🐡', name: '河豚', rarity: '普通', color: '#8b8b8b' },
            { emoji: '🦈', name: '鲨鱼', rarity: '稀有', color: '#a8a8a8' },
            { emoji: '🐳', name: '蓝鲸', rarity: '稀有', color: '#a8a8a8' },
            { emoji: '🦑', name: '鱿鱼', rarity: '稀有', color: '#a8a8a8' },
            { emoji: '🦐', name: '大虾', rarity: '稀有', color: '#a8a8a8' },
            { emoji: '🦞', name: '龙虾', rarity: '史诗', color: '#ffd700' },
            { emoji: '🦭', name: '海豹', rarity: '史诗', color: '#ffd700' },
            { emoji: '🐚', name: '贝壳', rarity: '传说', color: '#ff69b4' },
            { emoji: '🐬', name: '海豚', rarity: '传说', color: '#ff69b4' },
            { emoji: '🦛', name: '海牛', rarity: '传说', color: '#ff69b4' },
            { emoji: '🐋', name: '巨鲸', rarity: '传说', color: '#ff69b4' },
            { emoji: '🐸', name: '蓝鳍金枪鱼', rarity: '神话', color: '#00ffff' },
        ];

        // 游戏状态
        let cards = [];
        let slotCards = [];
        let selectedCard = null;
        let moves = 0;
        let startTime = null;
        let timerInterval = null;
        let level = 1;
        let gameOver = false;
        let timeOut = false; // 是否超时失败
        let unlockedFish = []; // 已解锁的鱼类
        let isPaused = false; // 游戏是否暂停
        let retryChanceUsed = false; // 当前关卡是否已使用重试机会
        let comboCount = 0; // 连击数
        let achievements = []; // 已获得的成就
        let isLinkMode = false; // 是否为连连看模式（第三关）
        let linkSelectedCards = []; // 连连看模式下选中的卡牌（最多2张）
        let dragStartCard = null; // 拖拽起始卡牌
        let isDragging = false; // 是否正在拖拽
        let dragLine = null; // 拖拽线条元素

        // 初始化游戏
        function initGame() {
            cards = [];
            slotCards = [];
            selectedCard = null;
            linkSelectedCards = []; // 重置连连看选中列表
            dragStartCard = null;
            isDragging = false;
            if (dragLine) {
                document.body.removeChild(dragLine);
                dragLine = null;
            }
            moves = 0;
            startTime = Date.now();
            gameOver = false;
            timeOut = false;
            // retryChanceUsed 不在这里重置，由进入新关卡的逻辑负责
            comboCount = 0; // 重置连击数

            document.getElementById('moves').textContent = '0';
            document.getElementById('winOverlay').classList.remove('show');
            document.getElementById('loseOverlay').classList.remove('show');

            // 先设置是否为连连看模式（第三关）
            isLinkMode = (level === 3);

            // 重置失败弹窗文字
            document.querySelector('#loseOverlay h2').textContent = isLinkMode ? '😢 没有可消除的牌了' : '😢 槽位满了';
            document.querySelector('#loseOverlay p').textContent = isLinkMode ? '找不到连接路径，再试一次！' : '不要气馁，再试一次！';

            // 连连看模式下隐藏槽位区域
            const cardSlot = document.getElementById('cardSlot');
            if (isLinkMode) {
                cardSlot.style.display = 'none';
            } else {
                cardSlot.style.display = 'grid';
                cardSlot.innerHTML = '';
            }

            document.getElementById('gameBoard').innerHTML = '';

            // 生成卡牌
            generateCards();
            renderCards();

            // 启动计时器
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        // 生成卡牌
        function generateCards() {
            const board = document.getElementById('gameBoard');
            const boardWidth = board.offsetWidth - 20;
            const boardHeight = board.offsetHeight - 20;

            // 根据关卡增加难度
            let cardCount, adjustedCardCount;

            if (isLinkMode) {
                // 连连看模式：成对生成（总数为偶数）
                cardCount = 30; // 15对牌
                adjustedCardCount = cardCount; // 确保是偶数
            } else {
                // 普通模式：3张成组
                cardCount = level === 1 ? 15 : Math.min(24 + level * 6, 60);
                adjustedCardCount = Math.floor(cardCount / 3) * 3;
            }

            // 生成卡牌组
            let cardTypes = [];

            // 所有关卡使用PNG鱼图
            const fishCount = Math.min(3 + (level - 1) * 2, LEVEL1_SPECIAL_FISH.length);

            if (isLinkMode) {
                // 连连看：每种鱼生成偶数张
                const pairsTotal = adjustedCardCount / 2;
                const pairsPerFish = Math.floor(pairsTotal / fishCount);
                const extraPairs = pairsTotal % fishCount;
                for (let fishIdx = 0; fishIdx < fishCount; fishIdx++) {
                    const count = (pairsPerFish + (fishIdx < extraPairs ? 1 : 0)) * 2;
                    for (let j = 0; j < count; j++) {
                        cardTypes.push(LEVEL1_SPECIAL_FISH[fishIdx].emoji);
                    }
                }
            } else {
                // 普通模式：每种鱼生成3的倍数张
                const tripletsTotal = adjustedCardCount / 3;
                const tripletsPerFish = Math.floor(tripletsTotal / fishCount);
                const extraTriplets = tripletsTotal % fishCount;
                for (let fishIdx = 0; fishIdx < fishCount; fishIdx++) {
                    const count = tripletsPerFish + (fishIdx < extraTriplets ? 1 : 0);
                    for (let j = 0; j < count * 3; j++) {
                        cardTypes.push(LEVEL1_SPECIAL_FISH[fishIdx].emoji);
                    }
                }
            }

            // 打乱
            cardTypes.sort(() => Math.random() - 0.5);

            // 创建卡牌对象并分层
            cards = cardTypes.map((type, index) => ({
                id: index,
                type: type,
                x: 0,
                y: 0,
                z: 0,
                disabled: false,
                gridRow: -1, // 连连看用的网格坐标
                gridCol: -1
            }));

            // 分层排列卡牌
            if (isLinkMode) {
                arrangeCardsGrid();
            } else {
                arrangeCardsLayered();
            }
        }

        // 连连看模式：网格排列卡牌
        function arrangeCardsGrid() {
            const board = document.getElementById('gameBoard');
            const boardWidth = board.offsetWidth;
            const boardHeight = board.offsetHeight;

            // 计算网格大小（6x5网格，可容纳30张牌）
            const cols = 6;
            const rows = 5;

            // 计算适合的卡片大小（等比缩放，保证不超出边界）
            const maxWidth = Math.floor((boardWidth - 4) / cols); // 进一步减少边距
            const maxHeight = Math.floor((boardHeight - 4) / rows);

            // 保持 CARD_WIDTH / CARD_HEIGHT 的比例
            const cardScale = Math.min(maxWidth / CARD_WIDTH, maxHeight / CARD_HEIGHT, 1.0); // 最多不缩放
            const scaledCardWidth = Math.floor(CARD_WIDTH * cardScale);
            const scaledCardHeight = Math.floor(CARD_HEIGHT * cardScale);

            const spacingX = scaledCardWidth + 1; // 间距从 3 减少到 1
            const spacingY = scaledCardHeight + 1;

            const totalWidth = (cols - 1) * spacingX + scaledCardWidth;
            const totalHeight = (rows - 1) * spacingY + scaledCardHeight;

            const offsetX = Math.floor((boardWidth - totalWidth) / 2);
            const offsetY = Math.floor((boardHeight - totalHeight) / 2);

            let cardIndex = 0;
            for (let row = 0; row < rows && cardIndex < cards.length; row++) {
                for (let col = 0; col < cols && cardIndex < cards.length; col++) {
                    if (cardIndex >= cards.length) break;

                    cards[cardIndex].x = offsetX + col * spacingX;
                    cards[cardIndex].y = offsetY + row * spacingY;
                    cards[cardIndex].z = 0; // 所有牌在同一层
                    cards[cardIndex].gridRow = row;
                    cards[cardIndex].gridCol = col;
                    cards[cardIndex].disabled = false; // 连连看没有遮挡
                    cards[cardIndex].scale = cardScale; // 存储缩放比例

                    cardIndex++;
                }
            }
        }

            // 分层排列卡牌
        function arrangeCardsLayered() {
            const board = document.getElementById('gameBoard');
            const boardWidth = board.offsetWidth;
            const boardHeight = board.offsetHeight;

            let cardIndex = 0;
            const layers = Math.ceil(cards.length / 12);

            for (let layer = 0; layer < layers && cardIndex < cards.length; layer++) {
                const cardsInLayer = Math.min(12, cards.length - cardIndex);
                const layerOffset = layer * 8;

                // 计算每层的卡牌排列
                const rowsThisLayer = Math.ceil(cardsInLayer / 5);
                const colsThisLayer = Math.min(5, cardsInLayer);

                // 计算居中偏移
                const totalWidth = (colsThisLayer - 1) * 68 + CARD_WIDTH;
                const totalHeight = (rowsThisLayer - 1) * 62 + CARD_HEIGHT;
                const offsetX = Math.floor((boardWidth - totalWidth) / 2) - (level >= 2 ? 7 : 0);
                const offsetY = Math.floor((boardHeight - totalHeight) / 2);

                for (let row = 0; row < rowsThisLayer && cardIndex < cards.length; row++) {
                    for (let col = 0; col < 5 && cardIndex < cards.length; col++) {
                        if (cardIndex >= cards.length) break;

                        cards[cardIndex].x = offsetX + col * 68 + layerOffset;
                        cards[cardIndex].y = offsetY + row * 62 + layerOffset;
                        cards[cardIndex].z = layer;

                        cardIndex++;
                    }
                }
            }

            // 计算每张卡牌是否被遮挡
            updateCardDisabled();
        }

        // 更新卡牌遮挡状态
        function updateCardDisabled() {
            for (let i = 0; i < cards.length; i++) {
                const card = cards[i];
                card.disabled = false;

                // 检查是否有更高层的卡牌遮挡
                for (let j = 0; j < cards.length; j++) {
                    if (i === j) continue;
                    const other = cards[j];

                    if (other.z > card.z) {
                        const overlapX = Math.abs(other.x - card.x) < CARD_WIDTH * 0.7;
                        const overlapY = Math.abs(other.y - card.y) < CARD_HEIGHT * 0.7;

                        if (overlapX && overlapY) {
                            card.disabled = true;
                            break;
                        }
                    }
                }
            }
        }

        // 渲染卡牌
        function renderCards() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';

            // 按 y 坐标（行）和 x 坐标（列）对卡牌进行分组排序
            // 同一行的卡牌，x 越小（越靠左）的 z-index 越高，这样左边的可以盖住右边的
            const sortedCards = [...cards].sort((a, b) => {
                if (Math.abs(a.y - b.y) < CARD_HEIGHT * 0.5) {
                    // 同一行，按 x 排序（左边在前，z-index 更高）
                    return a.x - b.x;
                }
                // 不同行，按 y 排序
                return a.y - b.y;
            });

            // 为每张卡牌计算渲染时的 z-index
            // 基础层级来自 card.z，同一行内从左到右递增
            const cardRenderZ = new Map();
            sortedCards.forEach((card, index) => {
                // 同一行内，每向右移动一张，z-index 增加 1
                cardRenderZ.set(card.id, card.z * 100 + index);
            });

            cards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card pile-card';
                cardEl.id = `card-${card.id}`;

                // 连连看模式下使用缩放后的尺寸
                const cardWidth = card.scale ? Math.floor(CARD_WIDTH * card.scale) : CARD_WIDTH;
                const cardHeight = card.scale ? Math.floor(CARD_HEIGHT * card.scale) : CARD_HEIGHT;
                cardEl.style.width = `${cardWidth}px`;
                cardEl.style.height = `${cardHeight}px`;
                cardEl.style.left = `${card.x}px`;
                cardEl.style.top = `${card.y}px`;
                cardEl.style.zIndex = cardRenderZ.get(card.id);

                // 只有被遮挡的卡牌才应用模糊效果
                if (card.disabled) {
                    cardEl.style.filter = 'blur(3px)';
                }

                // 所有关卡使用PNG图片
                const fish = LEVEL1_SPECIAL_FISH.find(f => f.emoji === card.type);
                if (fish && fish.image) {
                    cardEl.innerHTML = `<img src="${fish.image}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;image-rendering: auto;" alt="${fish.name}">`;
                } else {
                    cardEl.textContent = card.type;
                }

                if (card.disabled) {
                    cardEl.classList.add('disabled');
                }

                // 连连看模式：点击选择卡牌
                if (isLinkMode) {
                    cardEl.addEventListener('click', (e) => {
                        e.preventDefault();
                        handleLinkModeClick(card);
                    });
                } else {
                    // 普通模式：点击事件
                    cardEl.addEventListener('click', (e) => {
                        // 获取点击位置相对于卡牌的坐标
                        const rect = cardEl.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;

                        // 在卡牌层之下创建涟漪（相对于卡牌位置）
                        const board = document.getElementById('gameBoard');
                        const boardRect = board.getBoundingClientRect();
                        const rippleX = rect.left - boardRect.left + x - 30; // 30是涟漪半径
                        const rippleY = rect.top - boardRect.top + y - 30;

                        createRipple(rippleX, rippleY, board);

                        selectCard(card);
                    });
                }
                board.appendChild(cardEl);
            });
        }

        // 创建涟漪效果
        function createRipple(x, y, container) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            container.appendChild(ripple);

            // 动画结束后移除元素
            setTimeout(() => {
                if (ripple.parentNode) {
                    ripple.remove();
                }
            }, 600);
        }

        // 选择卡牌
        function selectCard(card) {
            if (gameOver) return;
            if (isPaused) return;
            if (card.disabled) {
                // 误点：卡片被遮挡
                triggerMistake();
                return;
            }

            // 连连看模式：两张匹配消除
            if (isLinkMode) {
                handleLinkModeSelect(card);
                return;
            }

            // 普通模式：移动到槽位
            const currentSlotSize = level >= 5 ? 3 : 4;
            if (slotCards.length >= currentSlotSize) return;

            // 获取卡牌元素位置
            const cardEl = document.getElementById(`card-${card.id}`);
            const rect = cardEl.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // 显示榔头动画
            showHammer(centerX, centerY);
            playHammerSound();
            // 卡牌被选中时冒烟
            spawnSmoke(cardEl, 6);

            // 延迟显示冰块破碎效果
            setTimeout(() => {
                showIceBreak(centerX, centerY);
            }, 100);

            // 延迟执行后续操作
            setTimeout(() => {
                // 移除卡牌
                cardEl.remove();
                cards = cards.filter(c => c.id !== card.id);

                // 更新遮挡状态
                updateCardDisabled();
                renderCards();

                // 添加到槽位
                slotCards.push(card);
                moves++;
                document.getElementById('moves').textContent = moves;

                renderSlot();
                checkMatch();
            }, 300);
        }

        // 连连看模式：处理卡牌点击选择
        function handleLinkModeClick(card) {
            if (card.disabled || gameOver) return;

            // 如果还没有选中的卡牌，选中当前卡牌
            if (!dragStartCard) {
                dragStartCard = card;
                const cardEl = document.getElementById(`card-${card.id}`);
                cardEl.classList.add('link-selected');
                return;
            }

            // 如果点击的是同一张卡牌，取消选中
            if (dragStartCard.id === card.id) {
                const cardEl = document.getElementById(`card-${card.id}`);
                cardEl.classList.remove('link-selected');
                dragStartCard = null;
                return;
            }

            // 如果点击了另一张卡牌，检查是否可以消除
            const startEl = document.getElementById(`card-${dragStartCard.id}`);
            const targetEl = document.getElementById(`card-${card.id}`);

            // 检查是否类型相同且可以连接（有路径）
            if (dragStartCard.type === card.type && canLink(dragStartCard, card)) {
                // 可以消除这两张卡牌
                eliminateLinkCards(dragStartCard, card);

                // 移除选中状态
                if (startEl) startEl.classList.remove('link-selected');
                if (targetEl) targetEl.classList.remove('link-selected');
                dragStartCard = null;
            } else {
                // 类型不同，更换选中卡牌
                if (startEl) startEl.classList.remove('link-selected');
                dragStartCard = card;
                if (targetEl) targetEl.classList.add('link-selected');
            }
        }

        // 连连看模式：开始拖拽
        function handleLinkModeDragStart(e, card) {
            if (!isLinkMode || card.disabled || gameOver) return;

            e.preventDefault();
            dragStartCard = card;
            isDragging = true;

            const cardEl = document.getElementById(`card-${card.id}`);
            cardEl.classList.add('link-selected');

            // 创建拖拽线条
            const board = document.getElementById('gameBoard');
            const boardRect = board.getBoundingClientRect();
            const cardRect = cardEl.getBoundingClientRect();

            dragLine = document.createElement('div');
            dragLine.style.position = 'fixed';
            dragLine.style.pointerEvents = 'none';
            dragLine.style.zIndex = '10000';
            dragLine.style.height = '4px';
            dragLine.style.background = 'linear-gradient(90deg, #ff69b4, #ffd700)';
            dragLine.style.borderRadius = '2px';
            dragLine.style.transformOrigin = 'left center';

            const startX = cardRect.left + cardRect.width / 2;
            const startY = cardRect.top + cardRect.height / 2;
            dragLine.style.left = startX + 'px';
            dragLine.style.top = startY + 'px';
            dragLine.style.width = '0px';

            document.body.appendChild(dragLine);

            // 存储起始点用于计算角度
            dragStartPoint = { x: startX, y: startY };
        }

        // 连连看模式：拖拽移动
        function handleLinkModeDragMove(e) {
            if (!isDragging || !dragLine || !dragStartCard) return;

            const cardEl = document.getElementById(`card-${dragStartCard.id}`);
            const cardRect = cardEl.getBoundingClientRect();
            const startX = cardRect.left + cardRect.width / 2;
            const startY = cardRect.top + cardRect.height / 2;

            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);

            const dx = clientX - startX;
            const dy = clientY - startY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const angle = Math.atan2(dy, dx) * 180 / Math.PI;

            dragLine.style.width = distance + 'px';
            dragLine.style.transform = `rotate(${angle}deg)`;
        }

        // 连连看模式：拖拽结束
        function handleLinkModeDragEnd(e) {
            if (!isDragging || !dragStartCard) return;

            isDragging = false;

            // 移除拖拽线条
            if (dragLine) {
                document.body.removeChild(dragLine);
                dragLine = null;
            }

            // 检测是否落在另一张卡牌上
            const clientX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
            const clientY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);

            // 查找鼠标位置下的卡牌
            const elements = document.elementsFromPoint(clientX, clientY);
            for (const el of elements) {
                if (el.classList.contains('pile-card')) {
                    const cardId = parseInt(el.id.replace('card-', ''));
                    const targetCard = cards.find(c => c.id === cardId);

                    if (targetCard && targetCard.id !== dragStartCard.id && !targetCard.disabled) {
                        // 找到了目标卡牌，检查是否可以连接
                        if (dragStartCard.type === targetCard.type && canLink(dragStartCard, targetCard)) {
                            // 可以消除
                            eliminateLinkCards(dragStartCard, targetCard);

                            // 移除选中状态
                            const startEl = document.getElementById(`card-${dragStartCard.id}`);
                            if (startEl) startEl.classList.remove('link-selected');
                            dragStartCard = null;
                            return;
                        }
                    }
                }
            }

            // 没有消除，移除选中状态
            const cardEl = document.getElementById(`card-${dragStartCard.id}`);
            if (cardEl) cardEl.classList.remove('link-selected');
            dragStartCard = null;
        }

        // 连连看：检测两张牌是否可以通过最多2个拐点的路径连接
        function canLink(card1, card2) {
            // 同一张牌
            if (card1 === card2) return false;

            // 检查直线连接（0个拐点）
            if (checkStraightLine(card1, card2)) return true;

            // 检查1个拐点
            if (checkOneCorner(card1, card2)) return true;

            // 检查2个拐点
            if (checkTwoCorners(card1, card2)) return true;

            return false;
        }

        // 获取连连看模式下的卡片尺寸（用于碰撞检测）
        function getLinkModeCardSize() {
            if (cards.length > 0 && cards[0].scale) {
                return {
                    width: Math.floor(CARD_WIDTH * cards[0].scale),
                    height: Math.floor(CARD_HEIGHT * cards[0].scale)
                };
            }
            return { width: CARD_WIDTH, height: CARD_HEIGHT };
        }

        // 检查直线连接（中间无阻挡）
        function checkStraightLine(c1, c2) {
            const cardSize = getLinkModeCardSize();

            // 同一行
            if (Math.abs(c1.y - c2.y) < cardSize.height / 2) {
                const minCol = Math.min(c1.x, c2.x);
                const maxCol = Math.max(c1.x, c2.x);
                // 检查中间是否有牌阻挡
                for (let card of cards) {
                    if (card.id !== c1.id && card.id !== c2.id && !card.disabled) {
                        if (Math.abs(card.y - c1.y) < cardSize.height / 2) {
                            if (card.x > minCol && card.x < maxCol) {
                                return false;
                            }
                        }
                    }
                }
                return true;
            }

            // 同一列
            if (Math.abs(c1.x - c2.x) < cardSize.width / 2) {
                const minRow = Math.min(c1.y, c2.y);
                const maxRow = Math.max(c1.y, c2.y);
                // 检查中间是否有牌阻挡
                for (let card of cards) {
                    if (card.id !== c1.id && card.id !== c2.id && !card.disabled) {
                        if (Math.abs(card.x - c1.x) < cardSize.width / 2) {
                            if (card.y > minRow && card.y < maxRow) {
                                return false;
                            }
                        }
                    }
                }
                return true;
            }

            return false;
        }

        // 检查1个拐点
        function checkOneCorner(c1, c2) {
            // 尝试两个拐点：(c1.x, c2.y) 和 (c2.x, c1.y)
            const corner1 = { x: c1.x, y: c2.y };
            const corner2 = { x: c2.x, y: c1.y };

            // 拐点1: c1 -> corner1 -> c2
            if (checkStraightLine(c1, corner1) && checkStraightLine(corner1, c2)) {
                return true;
            }

            // 拐点2: c1 -> corner2 -> c2
            if (checkStraightLine(c1, corner2) && checkStraightLine(corner2, c2)) {
                return true;
            }

            return false;
        }

        // 检查2个拐点
        function checkTwoCorners(c1, c2) {
            // 遍历所有可能的中间线
            // 先扫描所有可能的第一折线
            for (let card of cards) {
                if (card.id !== c1.id && card.id !== c2.id && !card.disabled) {
                    continue;
                }

                // 尝试水平扫描线
                const testPoints = [
                    { x: card.x, y: c1.y }, // c1所在行的水平扫描线
                    { x: card.x, y: c2.y }, // c2所在行的水平扫描线
                    { x: c1.x, y: card.y }, // c1所在列的垂直扫描线
                    { x: c2.x, y: card.y }, // c2所在列的垂直扫描线
                    { x: 0, y: c1.y }, // 边界线
                    { x: 0, y: c2.y },
                    { x: c1.x, y: 0 },
                    { x: c2.x, y: 0 },
                    { x: 1000, y: c1.y },
                    { x: 1000, y: c2.y },
                    { x: c1.x, y: 1000 },
                    { x: c2.x, y: 1000 }
                ];

                for (let testPoint of testPoints) {
                    // c1 -> testPoint -> c2 (1个拐点)
                    const tempCard1 = { x: c1.x, y: testPoint.y, id: -1 };
                    const tempCard2 = { x: testPoint.x, y: c2.y, id: -2 };

                    if (checkStraightLine(c1, tempCard1) &&
                        checkStraightLine(tempCard1, tempCard2) &&
                        checkStraightLine(tempCard2, c2)) {
                        return true;
                    }
                }
            }

            return false;
        }

        // 连连看：消除两张牌
        function eliminateLinkCards(card1, card2) {
            playMatchSound();

            // 增加连击数
            comboCount++;
            showCombo(comboCount);

            // 显示连线动画
            showLinkLine(card1, card2);

            // 产生粒子效果
            createEliminateParticles(card1);
            createEliminateParticles(card2);

            // 延迟后消除
            setTimeout(() => {
                const el1 = document.getElementById(`card-${card1.id}`);
                const el2 = document.getElementById(`card-${card2.id}`);

                if (el1) {
                    el1.classList.add('matched');
                    setTimeout(() => el1.remove(), 400);
                }
                if (el2) {
                    el2.classList.add('matched');
                    setTimeout(() => el2.remove(), 400);
                }

                cards = cards.filter(c => c.id !== card1.id && c.id !== card2.id);
                moves++;
                document.getElementById('moves').textContent = moves;

                linkSelectedCards = [];
                renderCards();

                checkGameState();
            }, 400);
        }

        // 创建消除粒子效果
        function createEliminateParticles(card) {
            const board = document.getElementById('gameBoard');
            const cardSize = getLinkModeCardSize();

            // 生成 8-12 个粒子
            const particleCount = 8 + Math.floor(Math.random() * 5);

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'link-particle';

                // 随机方向和距离
                const angle = (Math.PI * 2 * i) / particleCount + Math.random() * 0.5;
                const distance = 30 + Math.random() * 40;

                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;

                particle.style.cssText = `
                    left: ${card.x + cardSize.width / 2}px;
                    top: ${card.y + cardSize.height / 2}px;
                    width: ${8 + Math.random() * 8}px;
                    height: ${8 + Math.random() * 8}px;
                    background: ${getRandomParticleColor()};
                    border-radius: 50%;
                    --dx: ${dx}px;
                    --dy: ${dy}px;
                `;

                board.appendChild(particle);

                // 动画结束后移除
                setTimeout(() => particle.remove(), 600);
            }
        }

        // 随机粒子颜色
        function getRandomParticleColor() {
            const colors = [
                '#ffeb3b', // 黄色
                '#ff9800', // 橙色
                '#ff5722', // 红橙色
                '#4caf50', // 绿色
                '#2196f3', // 蓝色
                '#e91e63'  // 粉色
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // 获取连接路径（返回路径点数组，包括起点和终点）
        function getLinkPath(card1, card2) {
            // 尝试直线连接
            if (checkStraightLine(card1, card2)) {
                return [card1, card2];
            }

            // 尝试1个拐点
            const corner1 = { x: card1.x, y: card2.y };
            const corner2 = { x: card2.x, y: card1.y };

            if (checkStraightLine(card1, corner1) && checkStraightLine(corner1, card2)) {
                return [card1, corner1, card2];
            }
            if (checkStraightLine(card1, corner2) && checkStraightLine(corner2, card2)) {
                return [card1, corner2, card2];
            }

            // 尝试2个拐点
            for (let card of cards) {
                if (card.id !== card1.id && card.id !== card2.id && !card.disabled) {
                    continue;
                }

                const testPoints = [
                    { x: card.x, y: card1.y },
                    { x: card.x, y: card2.y },
                    { x: card1.x, y: card.y },
                    { x: card2.x, y: card.y },
                    { x: 0, y: card1.y },
                    { x: 0, y: card2.y },
                    { x: card1.x, y: 0 },
                    { x: card2.x, y: 0 },
                    { x: 1000, y: card1.y },
                    { x: 1000, y: card2.y },
                    { x: card1.x, y: 1000 },
                    { x: card2.x, y: 1000 }
                ];

                for (let testPoint of testPoints) {
                    const tempCard1 = { x: card1.x, y: testPoint.y, id: -1 };
                    const tempCard2 = { x: testPoint.x, y: card2.y, id: -2 };

                    if (checkStraightLine(card1, tempCard1) &&
                        checkStraightLine(tempCard1, tempCard2) &&
                        checkStraightLine(tempCard2, card2)) {
                        return [card1, tempCard1, tempCard2, card2];
                    }
                }
            }

            return null;
        }

        // 显示连线动画（绘制折线，虚线样式）
        function showLinkLine(card1, card2) {
            const board = document.getElementById('gameBoard');
            const path = getLinkPath(card1, card2);

            if (!path || path.length < 2) return;

            const cardSize = getLinkModeCardSize();

            // 为每段路径绘制一条渐变发光线
            for (let i = 0; i < path.length - 1; i++) {
                const p1 = path[i];
                const p2 = path[i + 1];

                const line = document.createElement('div');
                line.style.position = 'absolute';
                line.style.left = `${Math.min(p1.x, p2.x) + cardSize.width / 2}px`;
                line.style.top = `${Math.min(p1.y, p2.y) + cardSize.height / 2}px`;
                line.style.width = `${Math.abs(p2.x - p1.x) || cardSize.width}px`;
                line.style.height = `${Math.abs(p2.y - p1.y) || cardSize.height}px`;

                // 渐变发光效果
                line.style.background = 'linear-gradient(90deg, #ffeb3b 0%, #ff9800 50%, #ff5722 100%)';
                line.style.boxShadow = '0 0 10px #ff9800, 0 0 20px #ff9800';
                line.style.opacity = '1';
                line.style.zIndex = '500'; // 降低 z-index，让连线在卡片下方显示
                line.style.transition = 'opacity 0.3s';
                line.style.borderRadius = '4px';

                // 闪烁动画
                line.style.animation = 'lineFlash 0.15s ease-in-out 3';
                line.style.borderWidth = '4px';
                line.style.borderRadius = '2px';

                // 水平线
                if (Math.abs(p1.x - p2.x) > Math.abs(p1.y - p2.y)) {
                    line.style.height = '4px';
                    line.style.borderTopWidth = '4px';
                    line.style.borderBottomWidth = '0';
                    line.style.borderLeftWidth = '0';
                    line.style.borderRightWidth = '0';
                    line.style.backgroundColor = 'transparent';
                } else {
                    // 垂直线
                    line.style.width = '4px';
                    line.style.borderTopWidth = '0';
                    line.style.borderBottomWidth = '0';
                    line.style.borderLeftWidth = '4px';
                    line.style.borderRightWidth = '0';
                    line.style.backgroundColor = 'transparent';
                }

                board.appendChild(line);

                setTimeout(() => {
                    line.style.opacity = '0';
                    setTimeout(() => line.remove(), 300);
                }, 300);
            }
        }

        // 音效系统
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // 沙锤音效：两声轻快 "sha-sha"（高频噪声+带通滤波，间隔80ms）
        function playHammerSound() {
            const ctx = audioCtx;
            const at = ctx.currentTime;

            // ── 第一层咚：低频正弦，短促有力──
            const osc1 = ctx.createOscillator();
            const g1 = ctx.createGain();
            osc1.connect(g1); g1.connect(ctx.destination);
            osc1.type = 'sine';
            // 从 55Hz 掉到 30Hz，厚重"咚"声
            osc1.frequency.setValueAtTime(55, at);
            osc1.frequency.exponentialRampToValueAtTime(30, at + 0.15);
            g1.gain.setValueAtTime(0.001, at);
            g1.gain.linearRampToValueAtTime(0.5, at + 0.008);
            g1.gain.exponentialRampToValueAtTime(0.001, at + 0.2);
            osc1.start(at); osc1.stop(at + 0.21);

            // ── 第二层咚：延时80ms的回响──
            const osc2 = ctx.createOscillator();
            const g2 = ctx.createGain();
            osc2.connect(g2); g2.connect(ctx.destination);
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(55, at + 0.08);
            osc2.frequency.exponentialRampToValueAtTime(30, at + 0.23);
            g2.gain.setValueAtTime(0.001, at + 0.08);
            g2.gain.linearRampToValueAtTime(0.3, at + 0.088);
            g2.gain.exponentialRampToValueAtTime(0.001, at + 0.25);
            osc2.start(at + 0.08); osc2.stop(at + 0.26);

            // ── 低频冲击：三角波加低频分量──
            const osc3 = ctx.createOscillator();
            const g3 = ctx.createGain();
            osc3.connect(g3); g3.connect(ctx.destination);
            osc3.type = 'triangle';
            osc3.frequency.setValueAtTime(65, at);
            osc3.frequency.exponentialRampToValueAtTime(35, at + 0.12);
            g3.gain.setValueAtTime(0.001, at);
            g3.gain.linearRampToValueAtTime(0.15, at + 0.01);
            g3.gain.exponentialRampToValueAtTime(0.001, at + 0.18);
            osc3.start(at); osc3.stop(at + 0.19);

            // ── 高频瞬态：极短──
            const bufLen = Math.floor(ctx.sampleRate * 0.03);
            const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < bufLen; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i/(bufLen*0.3));
            const noise = ctx.createBufferSource();
            noise.buffer = buf;
            const hp = ctx.createBiquadFilter();
            hp.type = 'highpass'; hp.frequency.value = 3000;
            const noiseGain = ctx.createGain();
            noise.connect(hp); hp.connect(noiseGain); noiseGain.connect(ctx.destination);
            noiseGain.gain.setValueAtTime(0.08, at);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, at + 0.03);
            noise.start(at); noise.stop(at + 0.04);
        }

        // 消除音效：清脆的"叮叮叮"
        function playMatchSound() {
            const notes = [523, 659, 784]; // C5, E5, G5 和弦
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.06);
                gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.06);
                gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + i * 0.06 + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.06 + 0.4);
                osc.start(audioCtx.currentTime + i * 0.06);
                osc.stop(audioCtx.currentTime + i * 0.06 + 0.4);
            });
        }

        // 过关胜利音效：欢快上升音阶
        function playWinSound() {
            const notes = [523, 659, 784, 1047, 1319]; // C5 E5 G5 C6 E6
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.12);
                gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.12);
                gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + i * 0.12 + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.12 + 0.5);
                osc.start(audioCtx.currentTime + i * 0.12);
                osc.stop(audioCtx.currentTime + i * 0.12 + 0.5);
            });
        }

        // 失败音效：下降的哀伤音阶
        function playLoseSound() {
            const notes = [440, 349, 294, 220]; // A4 F4 D4 A3 下行
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.18);
                gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.18);
                gain.gain.linearRampToValueAtTime(0.35, audioCtx.currentTime + i * 0.18 + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.18 + 0.5);
                osc.start(audioCtx.currentTime + i * 0.18);
                osc.stop(audioCtx.currentTime + i * 0.18 + 0.5);
            });
        }

        // 开始游戏音效：振奋的三连击上扬
        function playStartSound() {
            const notes = [392, 523, 784]; // G4 C5 G5
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'square';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.1);
                gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.1);
                gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + i * 0.1 + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.1 + 0.35);
                osc.start(audioCtx.currentTime + i * 0.1);
                osc.stop(audioCtx.currentTime + i * 0.1 + 0.35);
            });
        }

        // ==============================
        // 背景音乐系统（8-bit 轻快循环）
        // ==============================
        let bgmPlaying = false;
        let bgmScheduled = [];   // 已调度的节点列表
        let bgmStartTime = 0;
        let bgmLoopTimeout = null;

        // ---- BGM 参数（怪奇物语/Stranger Things 风格）----
        const BPM = 120;                  // 复古合成器典型速度
        const B = 60 / BPM;
        const BGM_VOL = 0.099;

        // ── 旋律（80年代合成器风格，紧张神秘氛围）──
        // [频率Hz, 拍数, 音量系数, 波形类型]
        const melodyA = [
            // A段：小调紧张感（Am）
            [440,0.25,0.8,'sawtooth'],[523,0.25,0.85,'sawtooth'],
            [659,0.5,0.9,'sawtooth'],[784,0.5,0.85,'square'],
            [659,0.25,0.8,'sawtooth'],[523,0.25,0.75,'sawtooth'],
            [440,0.5,0.7,'sawtooth'],[349,0.5,0.65,'triangle'],
            // A段重复
            [440,0.25,0.8,'sawtooth'],[523,0.25,0.85,'sawtooth'],
            [659,0.5,0.9,'sawtooth'],[784,0.5,0.85,'square'],
            [659,0.25,0.8,'sawtooth'],[523,0.25,0.75,'sawtooth'],
            [440,0.5,0.7,'sawtooth'],[349,0.5,0.65,'triangle'],
        ];
        // B段：高潮推进
        const melodyB = [
            // B段1：更高张力
            [523,0.25,0.85,'sawtooth'],[659,0.25,0.9,'square'],
            [784,0.5,0.95,'sawtooth'],[880,0.5,0.9,'square'],
            [784,0.25,0.85,'sawtooth'],[659,0.25,0.8,'sawtooth'],
            [523,0.5,0.75,'triangle'],[440,0.5,0.7,'triangle'],
            // B段2：回落
            [659,0.25,0.8,'sawtooth'],[523,0.25,0.75,'square'],
            [440,0.5,0.7,'sawtooth'],[349,0.5,0.65,'triangle'],
            [440,0.25,0.7,'sawtooth'],[523,0.25,0.75,'sawtooth'],
            [659,0.5,0.8,'sawtooth'],[784,0.5,0.85,'sawtooth'],
        ];

        // ── 低音琶音（持续低音推进）──
        // [频率Hz, 拍数]
        const bassArpeggio = [
            // Am和弦琶音：A-E-C-G
            [220,0.25],[330,0.25],[440,0.25],[659,0.25],
            [220,0.25],[330,0.25],[440,0.25],[659,0.25],
            // F和弦琶音：F-C-A-F
            [175,0.25],[262,0.25],[350,0.25],[523,0.25],
            [175,0.25],[262,0.25],[350,0.25],[523,0.25],
            // C和弦琶音：C-G-E-C
            [262,0.25],[392,0.25],[523,0.25],[659,0.25],
            [262,0.25],[392,0.25],[523,0.25],[659,0.25],
            // E和弦琶音：E-B-G#-E
            [330,0.25],[494,0.25],[622,0.25],[784,0.25],
            [330,0.25],[494,0.25],[622,0.25],[784,0.25],
        ];

        // ── 复古鼓机节奏（80年代鼓机风格）──
        // {拍偏移, 类型(k=kick,sd=snare,ch=hihat), 音量}
        const drumSeq = [
            {o:0,   t:'k',  v:1.0},
            {o:0.5, t:'ch', v:0.6},
            {o:1,   t:'sd', v:0.8},
            {o:1.5, t:'ch', v:0.6},
            {o:2,   t:'k',  v:1.0},
            {o:2.5, t:'ch', v:0.6},
            {o:3,   t:'sd', v:0.8},
            {o:3.5, t:'ch', v:0.6},
        ];
        const DRUM_LOOP = 4;

        // ── 简化的BGM循环函数 ──
        function scheduleBgmLoop(startAt) {
            if (!bgmPlaying) return;
            const ctx = audioCtx;

            // 计算总循环时长（A+B段）
            const totalMelodyBeats = melodyA.reduce((s,[,b])=>s+b,0) + melodyB.reduce((s,[,b])=>s+b,0);
            const loopDuration = totalMelodyBeats * B;

            // ── 旋律 ──
            let tb = startAt;
            [...melodyA, ...melodyB].forEach(([freq, beats, vol, wave]) => {
                if (freq === 0) { tb += beats * B; return; }
                const dur = beats * B;
                const osc = ctx.createOscillator();
                const flt = ctx.createBiquadFilter();
                const g = ctx.createGain();
                osc.connect(flt); flt.connect(g); g.connect(ctx.destination);
                osc.type = wave;
                osc.frequency.setValueAtTime(freq, tb);
                // 复古合成器包络：快速attack，缓慢decay
                g.gain.setValueAtTime(0, tb);
                g.gain.linearRampToValueAtTime(BGM_VOL * vol * 0.8, tb + 0.02);
                g.gain.exponentialRampToValueAtTime(BGM_VOL * vol * 0.3, tb + dur * 0.5);
                g.gain.exponentialRampToValueAtTime(0.001, tb + dur - 0.05);
                osc.start(tb);
                osc.stop(tb + dur);
                bgmScheduled.push(osc);
                tb += dur;
            });

            // ── 低音琶音 ──
            let bb = startAt;
            while (bb < startAt + loopDuration) {
                bassArpeggio.forEach(([freq, beats]) => {
                    const dur = beats * B;
                    const osc = ctx.createOscillator();
                    const flt = ctx.createBiquadFilter();
                    const g = ctx.createGain();
                    osc.connect(flt); flt.connect(g); g.connect(ctx.destination);
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(freq, bb);
                    // 低频滤波器：复古贝斯声音
                    flt.type = 'lowpass';
                    flt.frequency.value = 600;
                    g.gain.setValueAtTime(0, bb);
                    g.gain.linearRampToValueAtTime(BGM_VOL * 0.5, bb + 0.01);
                    g.gain.exponentialRampToValueAtTime(BGM_VOL * 0.2, bb + dur * 0.3);
                    g.gain.exponentialRampToValueAtTime(0.001, bb + dur);
                    osc.start(bb);
                    osc.stop(bb + dur);
                    bgmScheduled.push(osc);
                    bb += dur;
                });
            }

            // ── 鼓机 ──
            const totalBeats = Math.ceil(loopDuration / B);
            for (let i = 0; i < totalBeats; i += DRUM_LOOP) {
                drumSeq.forEach(({o: offset, t: type, v: vol}) => {
                    const bt = startAt + (i + offset) * B;
                    if (bt >= startAt + loopDuration) return;
                    if (type === 'k') {
                        // Kick（80年代鼓机风格）
                        const osc = ctx.createOscillator();
                        const g = ctx.createGain();
                        osc.connect(g); g.connect(ctx.destination);
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(150, bt);
                        osc.frequency.exponentialRampToValueAtTime(40, bt + 0.1);
                        g.gain.setValueAtTime(BGM_VOL * 0.8 * vol, bt);
                        g.gain.exponentialRampToValueAtTime(0.001, bt + 0.15);
                        osc.start(bt);
                        osc.stop(bt + 0.15);
                        bgmScheduled.push(osc);
                    } else if (type === 'sd') {
                        // Snare（80年代鼓机风格）
                        const noise = ctx.createBufferSource();
                        const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.1), ctx.sampleRate);
                        const d = buf.getChannelData(0);
                        for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
                        noise.buffer = buf;
                        const flt = ctx.createBiquadFilter();
                        flt.type = 'highpass';
                        flt.frequency.value = 1000;
                        const g = ctx.createGain();
                        noise.connect(flt); flt.connect(g); g.connect(ctx.destination);
                        g.gain.setValueAtTime(BGM_VOL * 0.5 * vol, bt);
                        g.gain.exponentialRampToValueAtTime(0.001, bt + 0.08);
                        noise.start(bt);
                        noise.stop(bt + 0.1);
                        bgmScheduled.push(noise);
                    } else if (type === 'ch') {
                        // Hi-hat
                        const noise = ctx.createBufferSource();
                        const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.02), ctx.sampleRate);
                        const d = buf.getChannelData(0);
                        for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
                        noise.buffer = buf;
                        const flt = ctx.createBiquadFilter();
                        flt.type = 'highpass';
                        flt.frequency.value = 8000;
                        const g = ctx.createGain();
                        noise.connect(flt); flt.connect(g); g.connect(ctx.destination);
                        g.gain.setValueAtTime(BGM_VOL * 0.2 * vol, bt);
                        g.gain.exponentialRampToValueAtTime(0.001, bt + 0.015);
                        noise.start(bt);
                        noise.stop(bt + 0.02);
                        bgmScheduled.push(noise);
                    }
                });
            }

            bgmLoopTimeout = setTimeout(() => {
                scheduleBgmLoop(startAt + loopDuration + 1.0);
            }, (loopDuration - 0.2) * 1000);
        }



        // ── 鼓组发音 ──
        function playKick(ctx, at) {
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(130, at);
            osc.frequency.exponentialRampToValueAtTime(42, at + 0.12);
            g.gain.setValueAtTime(BGM_VOL * 1.35, at);
            g.gain.exponentialRampToValueAtTime(0.001, at + 0.2);
            osc.start(at); osc.stop(at + 0.21);
            bgmScheduled.push(osc);
        }
        function playSnare(ctx, at) {
            const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.14), ctx.sampleRate);
            const d = buf.getChannelData(0);
            for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.22));
            const src = ctx.createBufferSource(); src.buffer = buf;
            const flt = ctx.createBiquadFilter();
            flt.type='bandpass'; flt.frequency.value=900; flt.Q.value=1.0;
            const g = ctx.createGain();
            src.connect(flt); flt.connect(g); g.connect(ctx.destination);
            g.gain.setValueAtTime(BGM_VOL * 0.6, at);
            src.start(at); src.stop(at+0.15);
            bgmScheduled.push(src);
        }
        function playOpenHihat(ctx, at) {
            // open hihat：更长的decay，漂浮感
            const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.12), ctx.sampleRate);
            const d = buf.getChannelData(0);
            for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.6));
            const src = ctx.createBufferSource(); src.buffer = buf;
            const flt = ctx.createBiquadFilter();
            flt.type='highpass'; flt.frequency.value=7000;
            const g = ctx.createGain();
            src.connect(flt); flt.connect(g); g.connect(ctx.destination);
            g.gain.setValueAtTime(BGM_VOL * 0.28, at);
            g.gain.exponentialRampToValueAtTime(0.001, at+0.11);
            src.start(at); src.stop(at+0.12);
            bgmScheduled.push(src);
        }
        function playClosedHihat(ctx, at) {
            const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.022), ctx.sampleRate);
            const d = buf.getChannelData(0);
            for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
            const src = ctx.createBufferSource(); src.buffer = buf;
            const flt = ctx.createBiquadFilter();
            flt.type='highpass'; flt.frequency.value=9500;
            const g = ctx.createGain();
            src.connect(flt); flt.connect(g); g.connect(ctx.destination);
            g.gain.setValueAtTime(BGM_VOL * 0.16, at);
            g.gain.exponentialRampToValueAtTime(0.001, at+0.018);
            src.start(at); src.stop(at+0.022);
            bgmScheduled.push(src);
        }
        function playRim(ctx, at) {
            const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.035), ctx.sampleRate);
            const d = buf.getChannelData(0);
            for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.12));
            const src = ctx.createBufferSource(); src.buffer = buf;
            const flt = ctx.createBiquadFilter();
            flt.type='bandpass'; flt.frequency.value=2200; flt.Q.value=4;
            const g = ctx.createGain();
            src.connect(flt); flt.connect(g); g.connect(ctx.destination);
            g.gain.setValueAtTime(BGM_VOL * 0.35, at);
            src.start(at); src.stop(at+0.035);
            bgmScheduled.push(src);
        }
        // ── Jazz Ride Cymbal ──
        // 中频偏高的金属噪音，decay 比 closed hihat 更长，有"叮"的余音感
        function playRide(ctx, at) {
            const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.09), ctx.sampleRate);
            const d = buf.getChannelData(0);
            for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.35));
            const src = ctx.createBufferSource(); src.buffer = buf;
            const flt = ctx.createBiquadFilter();
            flt.type='bandpass'; flt.frequency.value=5500; flt.Q.value=0.7;
            const g = ctx.createGain();
            src.connect(flt); flt.connect(g); g.connect(ctx.destination);
            g.gain.setValueAtTime(BGM_VOL * 0.22, at);
            g.gain.exponentialRampToValueAtTime(0.001, at+0.08);
            src.start(at); src.stop(at+0.09);
            bgmScheduled.push(src);
        }

        // Rhodes 电钢琴（保留）
        function playRhodes(ctx, at, freq, dur, vol) {
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            const osc2 = ctx.createOscillator();
            const g2 = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc2.connect(g2); g2.connect(ctx.destination);
            osc.type = 'sine';
            osc2.type = 'triangle';
            osc.frequency.setValueAtTime(freq, at);
            osc2.frequency.setValueAtTime(freq * 2, at);
            g.gain.setValueAtTime(0, at);
            g.gain.linearRampToValueAtTime(BGM_VOL * 0.58 * vol, at + 0.012);
            g.gain.exponentialRampToValueAtTime(BGM_VOL * 0.18 * vol, at + dur * 0.5);
            g.gain.exponentialRampToValueAtTime(0.001, at + dur * 0.93);
            g2.gain.setValueAtTime(0, at);
            g2.gain.linearRampToValueAtTime(BGM_VOL * 0.1 * vol, at + 0.009);
            g2.gain.exponentialRampToValueAtTime(0.001, at + dur * 0.38);
            osc.start(at); osc.stop(at + dur);
            osc2.start(at); osc2.stop(at + dur * 0.4);
            bgmScheduled.push(osc); bgmScheduled.push(osc2);
        }

        // ── Dante Peluso 清亮电吉他 Lead Tone ──
        // 锯齿波 → 高通 (800Hz) → 薄身明亮感，模拟 clean electric guitar 单音
        // 配合 Rhodes 叠层，制造"吉他+电钢"的 80s indie 质感
        function playLeadGuitar(ctx, at, freq, dur, vol) {
            const osc = ctx.createOscillator();
            const filter = ctx.createBiquadFilter();
            const g = ctx.createGain();
            osc.connect(filter); filter.connect(g); g.connect(ctx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(freq, at);
            filter.type = 'highpass';
            filter.frequency.value = 800;
            filter.Q.value = 0.8;
            g.gain.setValueAtTime(0, at);
            g.gain.linearRampToValueAtTime(BGM_VOL * 0.22 * vol, at + 0.008);
            g.gain.exponentialRampToValueAtTime(BGM_VOL * 0.1 * vol, at + dur * 0.4);
            g.gain.exponentialRampToValueAtTime(0.001, at + Math.min(dur * 1.1, dur + 0.18));
            osc.start(at); osc.stop(at + dur + 0.2);
            bgmScheduled.push(osc);
        }

        // ── Dante Peluso 滑弦 slide-in ──
        // 从 slideFrom 频率快速滑入目标频率，模拟吉他 slide/legato
        function playSlide(ctx, at, slideFrom, targetFreq, vol) {
            const slideDur = 0.07;
            const osc = ctx.createOscillator();
            const filter = ctx.createBiquadFilter();
            const g = ctx.createGain();
            osc.connect(filter); filter.connect(g); g.connect(ctx.destination);
            osc.type = 'sawtooth';
            filter.type = 'highpass';
            filter.frequency.value = 700;
            filter.Q.value = 0.6;
            osc.frequency.setValueAtTime(slideFrom, at);
            osc.frequency.linearRampToValueAtTime(targetFreq, at + slideDur);
            g.gain.setValueAtTime(0, at);
            g.gain.linearRampToValueAtTime(BGM_VOL * 0.16 * vol, at + 0.01);
            g.gain.exponentialRampToValueAtTime(0.001, at + slideDur + 0.04);
            osc.start(at); osc.stop(at + slideDur + 0.05);
            bgmScheduled.push(osc);
        }

        // 装饰音（倚音）：主音前 50ms 快速划过
        function playGrace(ctx, at, graceFreq, mainFreq) {
            const dur = 0.05;
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(graceFreq, at - dur);
            osc.frequency.linearRampToValueAtTime(mainFreq, at);
            g.gain.setValueAtTime(BGM_VOL * 0.3, at - dur);
            g.gain.linearRampToValueAtTime(0.001, at);
            osc.start(at - dur); osc.stop(at + 0.01);
            bgmScheduled.push(osc);
        }

        // 电吉他 muted strum（切音：短促锯齿+高通）
        function playMutedGuitar(ctx, at, chordNotes, vol) {
            chordNotes.forEach((freq, i) => {
                const staggerDelay = i * 0.012; // 各弦略微错开，像真的拨弦
                const osc = ctx.createOscillator();
                const flt = ctx.createBiquadFilter();
                const g = ctx.createGain();
                osc.connect(flt); flt.connect(g); g.connect(ctx.destination);
                osc.type = 'sawtooth';
                flt.type = 'bandpass';
                flt.frequency.value = 1600;
                flt.Q.value = 2.5;
                osc.frequency.setValueAtTime(freq, at + staggerDelay);
                // 极短包络：muted 感
                g.gain.setValueAtTime(0, at + staggerDelay);
                g.gain.linearRampToValueAtTime(BGM_VOL * 0.22 * vol, at + staggerDelay + 0.008);
                g.gain.exponentialRampToValueAtTime(0.001, at + staggerDelay + 0.07);
                osc.start(at + staggerDelay);
                osc.stop(at + staggerDelay + 0.08);
                bgmScheduled.push(osc);
            });
        }



        function startBgm() {
            if (bgmPlaying) return;
            // 确保 AudioContext 已激活
            if (audioCtx.state === 'suspended') audioCtx.resume();
            bgmPlaying = true;
            bgmStartTime = audioCtx.currentTime + 0.1;
            scheduleBgmLoop(bgmStartTime);
        }

        function stopBgm() {
            bgmPlaying = false;
            clearTimeout(bgmLoopTimeout);
            bgmScheduled.forEach(node => {
                try { node.stop(); } catch(e) {}
            });
            bgmScheduled = [];
        }

        // ==============================

        // 显示榔头砸击动画
        function showHammer(x, y) {
            const hammer = document.createElement('div');
            hammer.className = 'hammer';
            hammer.innerHTML = `<img src="Hammer_small.png" style="width:50px;height:50px;object-fit:contain;transform:scaleX(-1);" alt="hammer">`;
            // 榔头直接出现在卡牌中心上方一点的位置
            hammer.style.left = (x - 25) + 'px';
            hammer.style.top = (y - 15) + 'px';
            hammer.style.animation = 'hammerSmash 0.25s ease-out forwards';

            document.body.appendChild(hammer);

            setTimeout(() => {
                if (hammer.parentNode) {
                    hammer.remove();
                }
            }, 250);
        }

        // 显示冰块破碎效果
        function showIceBreak(x, y) {
            const iceEmojis = ['🤍', '❄️', '🧊', '💠'];
            const particleCount = 12;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'ice-particle';
                particle.textContent = iceEmojis[Math.floor(Math.random() * iceEmojis.length)];
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.fontSize = '28px';
                particle.style.filter = 'brightness(1.8) saturate(0.3)';

                // 随机散开的方向和距离
                const angle = (Math.PI * 2 * i) / particleCount;
                const distance = 70 + Math.random() * 70;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                const rot = Math.random() * 360 - 180;

                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                particle.style.setProperty('--rot', rot + 'deg');

                document.body.appendChild(particle);

                setTimeout(() => {
                    if (particle.parentNode) {
                        particle.remove();
                    }
                }, 500);
            }
        }

        // 碎冰颗粒：在目标元素位置爆出 n 个冰碴四散飞出
        function spawnIceShards(el, n) {
            if (!el) return;
            const rect = el.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const colors = [
                'rgba(200,240,255,0.95)',
                'rgba(150,210,255,0.9)',
                'rgba(255,255,255,0.95)',
                'rgba(100,190,255,0.85)',
            ];
            for (let i = 0; i < n; i++) {
                const shard = document.createElement('div');
                shard.className = 'ice-shard';
                const angle = (Math.PI * 2 / n) * i + (Math.random() - 0.5) * 0.8;
                const dist = 50 + Math.random() * 80; // 放大飞出距离
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist - 10; // 略微上偏
                const rot = (Math.random() - 0.5) * 540;
                const dur = 0.45 + Math.random() * 0.3;
                const w = 8 + Math.random() * 12; // 放大宽度
                const h = 6 + Math.random() * 10; // 放大高度
                const color = colors[Math.floor(Math.random() * colors.length)];
                shard.style.cssText = `
                    left:${cx - w/2 + (Math.random()-0.5)*rect.width*0.5}px;
                    top:${cy - h/2 + (Math.random()-0.5)*rect.height*0.4}px;
                    width:${w}px; height:${h}px;
                    --color:${color};
                    --tx:${tx}px; --ty:${ty}px;
                    --rot:${rot}deg; --dur:${dur}s;
                    animation-delay:${i * 0.02}s;
                `;
                document.body.appendChild(shard);
                setTimeout(() => shard.remove(), (dur + i * 0.02 + 0.1) * 1000);
            }
        }

        // 烟雾粒子：在目标元素周围生成 n 个向上飘散的烟雾
        function spawnSmoke(el, n) {
            if (!el) return;
            const rect = el.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            for (let i = 0; i < n; i++) {
                const puff = document.createElement('div');
                puff.className = 'smoke-puff';
                // 随机起始偏移
                const ox = (Math.random() - 0.5) * rect.width * 0.7;
                const oy = (Math.random() - 0.5) * rect.height * 0.5;
                // 飘向：主要向上，略带横向随机
                const tx = (Math.random() - 0.5) * 40;
                const ty = -(20 + Math.random() * 40);
                const sc = 1.8 + Math.random() * 1.4;
                const dur = 0.8 + Math.random() * 0.5;
                const size = 8 + Math.random() * 10;
                puff.style.cssText = `
                    left:${cx + ox - size/2}px;
                    top:${cy + oy - size/2}px;
                    width:${size}px; height:${size}px;
                    --tx:${tx}px; --ty:${ty}px; --sc:${sc}; --dur:${dur}s;
                    animation-delay:${i * 0.06}s;
                `;
                document.body.appendChild(puff);
                setTimeout(() => puff.remove(), (dur + i * 0.06 + 0.1) * 1000);
            }
        }

        // 渲染槽位
        function renderSlot() {
            const slot = document.getElementById('cardSlot');
            slot.innerHTML = '';

            // 根据关卡确定槽位数量
            const currentSlotSize = level >= 5 ? 3 : 4;

            // 先渲染空槽位占位符
            for (let i = 0; i < currentSlotSize; i++) {
                const placeholder = document.createElement('div');
                placeholder.className = 'slot-placeholder';
                placeholder.dataset.index = i;
                slot.appendChild(placeholder);
            }

            // 渲染卡牌（替换占位符）
            slotCards.forEach((card, index) => {
                const placeholders = slot.querySelectorAll('.slot-placeholder');
                const targetPlaceholder = placeholders[index];

                if (targetPlaceholder) {
                    targetPlaceholder.style.background = 'transparent';
                    targetPlaceholder.style.border = 'none';
                    targetPlaceholder.style.color = 'black';

                    // 所有关卡使用图片
                    const fish = LEVEL1_SPECIAL_FISH.find(f => f.emoji === card.type);
                    if (fish && fish.image) {
                        targetPlaceholder.innerHTML = `<img src="${fish.image}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;image-rendering: auto;" alt="${fish.name}">`;
                    } else {
                        targetPlaceholder.textContent = card.type;
                        targetPlaceholder.style.fontSize = '45px';
                        targetPlaceholder.style.fontWeight = '900';
                    }

                    // 最后落入的卡片触发颤动 + 烟雾
                    if (index === slotCards.length - 1) {
                        targetPlaceholder.classList.add('slot-bounce');
                        // 稍微延迟一帧再取位置，确保DOM已渲染
                        requestAnimationFrame(() => spawnSmoke(targetPlaceholder, 7));
                    }
                }
            });
        }

        // 检查匹配
        function checkMatch() {
            // 统计每种类型的数量
            const typeCount = {};
            slotCards.forEach(card => {
                typeCount[card.type] = (typeCount[card.type] || 0) + 1;
            });

            // 找到可以消除的类型
            const toRemove = [];
            for (const type in typeCount) {
                if (typeCount[type] >= 3) {
                    let count = 0;
                    for (let i = slotCards.length - 1; i >= 0; i--) {
                        if (slotCards[i].type === type) {
                            toRemove.push(i);
                            count++;
                            if (count >= 3) break;
                        }
                    }
                }
            }

            if (toRemove.length > 0) {
                playMatchSound();

                // 增加连击数
                comboCount++;
                console.log('连击数:', comboCount, '消除数量:', toRemove.length);

                // 显示连击提示 + 触发奖励
                showCombo(comboCount);

                // 检查连击成就（触发一次就解锁）
                if (comboCount === 3) unlockAchievement('TRIPLE_COMBO');
                if (comboCount === 5) unlockAchievement('FIVE_COMBO');
                if (comboCount === 10) unlockAchievement('TEN_COMBO');
            } else {
                // 没有消除，连击中断
                console.log('没有消除，连击中断，当前连击数:', comboCount);
                comboCount = 0;
            }

            // 消除匹配的卡牌（从后往前删除）
            toRemove.sort((a, b) => b - a);
            const placeholders = document.querySelectorAll('.slot-placeholder');

            // 获取卡槽区的中心点
            const cardSlot = document.getElementById('cardSlot');
            const slotRect = cardSlot.getBoundingClientRect();
            const centerX = slotRect.left + slotRect.width / 2;
            const centerY = slotRect.top + slotRect.height / 2;

            toRemove.forEach((index, i) => {
                const ph = placeholders[index];
                if (ph) {
                    // 获取当前卡牌的位置
                    const cardRect = ph.getBoundingClientRect();
                    const cardCenterX = cardRect.left + cardRect.width / 2;
                    const cardCenterY = cardRect.top + cardRect.height / 2;

                    // 计算到中心点的偏移量
                    const translateX = centerX - cardCenterX;
                    const translateY = centerY - cardCenterY;

                    // 设置自定义属性用于动画
                    ph.style.setProperty('--tx', translateX + 'px');
                    ph.style.setProperty('--ty', translateY + 'px');

                    ph.classList.add('matched');
                    // 碎冰颗粒，每张卡错开 60ms 爆出，更有层次感
                    setTimeout(() => spawnIceShards(ph, 12), i * 60);
                }
            });

            setTimeout(() => {
                toRemove.forEach(index => {
                    slotCards.splice(index, 1);
                });
                renderSlot();
                checkGameState();
            }, 400);
        }

        // 检查游戏状态
        function checkGameState() {
            // 连连看模式：胜利条件是所有牌都被消除
            if (isLinkMode) {
                if (cards.length === 0) {
                    gameOver = true;
                    clearInterval(timerInterval);

                    // 检查成就
                    if (level === 3) unlockAchievement('FIRST_LEVEL');
                    if (unlockedFish.length >= 10) unlockAchievement('FISH_COLLECTOR');

                    // 更新胜利弹窗
                    const elapsed = Math.floor((Date.now() - startTime) / 1000);
                    const minutes = Math.floor(elapsed / 60);
                    const seconds = elapsed % 60;
                    document.getElementById('winStats').innerHTML =
                        `用时: ${minutes}:${seconds.toString().padStart(2, '0')} | 移动次数: ${moves}<br>
                        <span style="color: #ffd700; font-size: 20px;">✨ 连连看通关！</span>`;

                    // 检查新手教程是否还在显示
                    const tutorialOverlay = document.getElementById('tutorialOverlay');
                    if (tutorialOverlay && tutorialOverlay.classList.contains('show')) {
                        // 教程还在显示，暂不显示过关弹窗，等教程关闭后再显示
                        // 标记需要显示过关弹窗
                        window.showWinAfterTutorial = true;
                    } else {
                        // 直接显示过关弹窗
                        document.getElementById('winOverlay').classList.add('show');
                        stopBgm();
                        playWinSound();
                    }
                    return;
                }

                // 连连看模式：检查是否还有可消除的牌
                if (!hasPossibleMatch()) {
                    gameOver = true;
                    clearInterval(timerInterval);

                    const retryBtn = document.getElementById('retryLevelBtn');
                    if (!retryChanceUsed) {
                        document.getElementById('loseTitle').textContent = '😢 没有可消除的牌了';
                        document.getElementById('loseMessage').textContent = '⚠️ 仅剩最后一次重试机会！';
                        retryBtn.style.display = 'inline-block';
                        retryBtn.textContent = '🔄 重试本关';
                    } else {
                        document.getElementById('loseTitle').textContent = '😢 挑战失败';
                        document.getElementById('loseMessage').textContent = '重试机会已用完，回到第一关吧！';
                        retryBtn.style.display = 'none';
                    }

                    document.getElementById('loseOverlay').classList.add('show');
                    stopBgm();
                    playLoseSound();
                }
                return;
            }

            // 普通模式：胜利条件
            if (cards.length === 0 && slotCards.length === 0) {
                gameOver = true;
                clearInterval(timerInterval);

                // 解锁新鱼类
                // 第一关解锁前3种鱼（海星、寄居蟹、章鱼），其他关卡按关卡解锁
                const fishIndex = level === 1 ? Math.floor(Math.random() * 3) : Math.min(level - 1, FISH_COLLECTION.length - 1);
                if (!unlockedFish.includes(fishIndex)) {
                    unlockedFish.push(fishIndex);
                }

                // 检查成就
                if (level === 1) unlockAchievement('FIRST_LEVEL');
                if (unlockedFish.length >= 10) unlockAchievement('FISH_COLLECTOR');

                // 更新胜利弹窗
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                const newFish = FISH_COLLECTION[fishIndex];
                document.getElementById('winStats').innerHTML =
                    `用时: ${minutes}:${seconds.toString().padStart(2, '0')} | 移动次数: ${moves}<br>
                    <span style="color: #ffd700; font-size: 20px;">✨ 解锁新鱼：${newFish.emoji} ${newFish.name} (${newFish.rarity})</span>`;

                // 检查新手教程是否还在显示
                const tutorialOverlay = document.getElementById('tutorialOverlay');
                if (tutorialOverlay && tutorialOverlay.classList.contains('show')) {
                    // 教程还在显示，暂不显示过关弹窗，等教程关闭后再显示
                    window.showWinAfterTutorial = true;
                } else {
                    // 直接显示过关弹窗
                    document.getElementById('winOverlay').classList.add('show');
                    stopBgm();
                    playWinSound();
                }
                return;
            }

            // 检查是否失败（槽位满了且没有可消除的）
            const currentSlotSize = level >= 5 ? 3 : 4;
            if (slotCards.length >= currentSlotSize) {
                const typeCount = {};
                slotCards.forEach(card => {
                    typeCount[card.type] = (typeCount[card.type] || 0) + 1;
                });
                const canMatch = Object.values(typeCount).some(count => count >= 3);
                if (!canMatch) {
                    gameOver = true;
                    clearInterval(timerInterval);

                    // 显示失败弹窗，根据是否有重试机会显示不同的按钮
                    const retryBtn = document.getElementById('retryLevelBtn');
                    if (level === 1 || !retryChanceUsed) {
                        // 第一关不限次数 / 第二关及以后还有重试机会
                        document.getElementById('loseTitle').textContent = '😢 槽位满了';
                        document.getElementById('loseMessage').textContent = level === 1 ? '别灰心，再试一次！' : '⚠️ 仅剩最后一次重试机会！';
                        retryBtn.style.display = 'inline-block';
                        retryBtn.textContent = '🔄 重试本关';
                    } else {
                        // 已使用重试机会（第二关及以后）
                        document.getElementById('loseTitle').textContent = '😢 挑战失败';
                        document.getElementById('loseMessage').textContent = '重试机会已用完，回到第一关吧！';
                        retryBtn.style.display = 'none';
                    }

                    document.getElementById('loseOverlay').classList.add('show');
                    stopBgm();
                    playLoseSound();
                }
            }
        }

        // 触发误点惩罚
        function triggerMistake() {

            const cardEl = document.getElementById(`card-${selectedCard ? selectedCard.id : ''}`);
