        // 显示连击提示 + 发放奖励
        function showCombo(combo) {
            // 只在≥3连击时显示提示和奖励
            if (combo < 3) return;

            console.log('显示连击:', combo);

            // --- 连击主标题 ---
            const display = document.createElement('div');
            display.className = 'combo-display';

            let bonusSeconds = 0;
            let bonusText = '';
            let removeOldestCard = false;
            let clearAllSlots = false;

            // 判定奖励类型（基于当前连击数）
            if (combo >= 10) {
                // ≥10连击：+8秒 + 清空所有槽位
                display.textContent = '🌟 十连击！';
                display.style.fontSize = '60px';
                display.style.color = '#ff69b4';
                bonusSeconds = 8;
                bonusText = `+${bonusSeconds}s ✨ 槽位已清空！`;
                clearAllSlots = true;
            } else if (combo >= 5) {
                // ≥5连击：+5秒 + 移除最旧的一张牌
                display.textContent = '💥 五连击！';
                display.style.fontSize = '52px';
                display.style.color = '#ff4444';
                bonusSeconds = 5;
                bonusText = `+${bonusSeconds}s 🎁 移除1张！`;
                removeOldestCard = true;
            } else if (combo >= 3) {
                // ≥3连击：+3秒
                display.textContent = '🔥 三连击！';
                display.style.fontSize = '44px';
                display.style.color = '#ff8c00';
                bonusSeconds = 3;
                bonusText = `+${bonusSeconds}s`;
            }

            document.body.appendChild(display);
            setTimeout(() => display.remove(), 900);

            // --- 加时间 ---
            if (bonusSeconds > 0 && !gameOver) {
                startTime += bonusSeconds * 1000; // 让startTime后移，等效于延长时间
                playComboRewardSound(1);

                // 显示奖励浮字
                const bonus = document.createElement('div');
                bonus.className = 'combo-bonus';
                bonus.textContent = bonusText;
                document.body.appendChild(bonus);
                setTimeout(() => bonus.remove(), 1200);
            }

            // --- 清空所有槽位 ---
            if (clearAllSlots && !gameOver) {
                setTimeout(() => {
                    slotCards = [];
                    renderSlot();
                    playComboRewardSound(3);
                }, 450);
            }

            // --- 移除最旧的一张牌 ---
            if (removeOldestCard && !gameOver && slotCards.length > 0) {
                setTimeout(() => {
                    slotCards.shift();
                    renderSlot();
                    playComboRewardSound(2);
                }, 450);
            }
        }

        // 连击奖励音效
        function playComboRewardSound(level) {
            if (!audioCtx) return;
            // level: 1=三连(叮), 2=五连(叮叮), 3=十连(三音上扬)
            const sequences = {
                1: [{ f: 880, t: 0,    d: 0.2 }],
                2: [{ f: 880, t: 0,    d: 0.15 }, { f: 1047, t: 0.15, d: 0.2 }],
                3: [{ f: 880, t: 0,    d: 0.12 }, { f: 1047, t: 0.13, d: 0.12 }, { f: 1319, t: 0.26, d: 0.25 }],
            };
            const seq = sequences[level] || sequences[1];
            seq.forEach(({ f, t, d }) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.value = f;
                gain.gain.setValueAtTime(0, audioCtx.currentTime + t);
                gain.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + t + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + t + d);
                osc.start(audioCtx.currentTime + t);
                osc.stop(audioCtx.currentTime + t + d + 0.05);
            });
        }

        // 解锁成就
        function unlockAchievement(achievementId) {
            // 检查是否已获得
            if (achievements.includes(achievementId)) return;

            const achievement = ACHIEVEMENTS[achievementId];
            if (!achievement) return;

            // 添加到已获得列表
            achievements.push(achievementId);

            // 显示成就弹窗
            const popup = document.getElementById('achievementPopup');
            document.getElementById('achievementIcon').textContent = achievement.icon;
            document.getElementById('achievementTitle').textContent = achievement.title;
            document.getElementById('achievementDesc').textContent = achievement.desc;

            popup.classList.add('show');

            // 播放成就音效（复用胜利音效）
            playWinSound();

            // 3秒后隐藏
            setTimeout(() => {
                popup.classList.remove('show');
            }, 3000);
        }

        // 连连看模式：检测是否还有可消除的牌对
        function hasPossibleMatch() {
            const activeCards = cards.filter(c => !c.disabled);
            if (activeCards.length < 2) return false;

            // 遍历所有牌对，检查是否可以连接
            for (let i = 0; i < activeCards.length; i++) {
                for (let j = i + 1; j < activeCards.length; j++) {
                    if (activeCards[i].type === activeCards[j].type) {
                        if (canLink(activeCards[i], activeCards[j])) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // 更新计时器
        function updateTimer() {
            if (gameOver) return;
            const elapsed = Math.floor((Date.now() - startTime) / 1000);

            // 计算当前关卡的时间限制
            const timeLimit = Math.max(TIME_LIMIT_BASE - (level - 1), 10);

            // 检查时间限制
            if (elapsed >= timeLimit) {
                gameOver = true;
                timeOut = true;
                clearInterval(timerInterval);

                // 显示失败弹窗，根据是否有重试机会显示不同的按钮
                const retryBtn = document.getElementById('retryLevelBtn');
                if (level === 1 || !retryChanceUsed) {
                    // 第一关不限次数 / 第二关及以后还有重试机会
                    document.getElementById('loseTitle').textContent = '⏰ 时间已耗尽！';
                    document.getElementById('loseMessage').textContent = level === 1 ? `${timeLimit}秒内完成挑战，再试一次！` : `⚠️ 仅剩最后一次重试机会！`;
                    retryBtn.style.display = 'inline-block';
                    retryBtn.textContent = '🔄 重试本关';
                } else {
                    // 已使用重试机会（第二关及以后）
                    document.getElementById('loseTitle').textContent = '⏰ 挑战失败';
                    document.getElementById('loseMessage').textContent = '重试机会已用完，回到第一关吧！';
                    retryBtn.style.display = 'none';
                }

                document.getElementById('loseOverlay').classList.add('show');
                stopBgm();
                playLoseSound();
                return;
            }

            // 显示倒计时
            const remaining = timeLimit - elapsed;
            document.getElementById('time').textContent =
                `${remaining.toString().padStart(2, '0')}s`;

            // 时间紧迫提示
            const timeEl = document.getElementById('time');
            const timeRatio = remaining / timeLimit;

            // 重置样式
            timeEl.classList.remove('timer-warning', 'timer-critical');
            timeEl.style.color = 'white';

            if (timeRatio <= 0.1 && remaining > 0) {
                // 时间不足10%（严重警告）
                timeEl.classList.add('timer-critical');
            } else if (timeRatio <= 0.3) {
                // 时间不足30%（警告）
                timeEl.classList.add('timer-warning');
                timeEl.style.color = '#ffaa00';
            }
        }

        // 当前关卡需要加载的图片（在initGame中重新计算）
        let currentLevelImages = [];
        let currentLevelFishItems = {};

        // 加载当前关卡的资源
        function loadLevelResources(levelNum, onComplete) {
            const loadingScreen = document.getElementById('loadingScreen');
            loadingScreen.classList.add('visible');

            // 计算当前关卡用到的鱼
            const fishCount = Math.min(3 + (levelNum - 1) * 2, LEVEL1_SPECIAL_FISH.length);
            const currentFish = LEVEL1_SPECIAL_FISH.slice(0, fishCount);

            // 当前关卡需要预加载的所有图片
            const imagesToLoad = [
                ...currentFish.map(f => f.image),
                'Hammer_small.png',
                'BG005a.jpg'
            ];

            // 构建 loading 鱼缩略图行
            const row = document.getElementById('loadingFishRow');
            row.innerHTML = '';
            const fishItems = {};
            currentFish.forEach(f => {
                const item = document.createElement('div');
                item.className = 'loading-fish-item';
                item.innerHTML = `<img src="${f.image}" alt="">`;
                row.appendChild(item);
                fishItems[f.image] = item;
            });
            currentLevelFishItems = fishItems;

            const bar = document.getElementById('loadingBar');
            const pct = document.getElementById('loadingPct');

            let loaded = 0;
            const total = imagesToLoad.length;
            let completed = false;

            function onAllLoaded() {
                if (completed) return;
                completed = true;
                bar.style.width = '100%';
                pct.textContent = '100%';
                setTimeout(() => {
                    loadingScreen.classList.add('fadeout');
                    setTimeout(() => {
                        loadingScreen.classList.remove('visible', 'fadeout');
                        row.innerHTML = '';
                        onComplete();
                    }, 500);
                }, 300);
            }

            function onOne(src) {
                loaded++;
                const p = Math.round(loaded / total * 100);
                bar.style.width = p + '%';
                pct.textContent = p + '%';
                if (fishItems[src]) fishItems[src].classList.add('loaded');
                if (loaded >= total) onAllLoaded();
            }

            // 使用 Promise 确保所有图片都加载完成
            const loadPromises = imagesToLoad.map(src => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        onOne(src);
                        resolve();
                    };
                    img.onerror = () => {
                        console.error('图片加载失败:', src);
                        onOne(src); // 即使失败也继续
                        resolve();
                    };
                    img.src = src;
                });
            });

            // 等待所有图片加载完成
            Promise.all(loadPromises).then(() => {
                console.log('所有图片加载完成');
            }).catch(err => {
                console.error('图片加载出错:', err);
                if (!completed) {
                    onAllLoaded();
                }
            });
        }

        // 开始游戏（从开始界面）
        function startGame() {
            // 请求全屏（用户手势触发，浏览器允许）
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();

            playStartSound();

            // 隐藏开始界面
            document.getElementById('startScreen').style.display = 'none';

            // 加载第一关资源
            level = 1;
            retryChanceUsed = false;
            loadLevelResources(level, () => {
                document.getElementById('gameContainer').classList.remove('game-hidden');
                setTimeout(() => startBgm(), 1500);
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        initGame();
                        // 显示新手教程
                        setTimeout(() => showTutorial(), 500);
                    });
                });
            });
        }

        // 进入下一关
        function nextLevel() {
            // 隐藏胜利弹窗
            document.getElementById('winOverlay').classList.remove('show');

            level++;

            // 更新关卡显示
            document.getElementById('level').textContent = `第 ${level} 关`;

            // 加载下一关资源
            loadLevelResources(level, () => {
                retryChanceUsed = false;
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        initGame();
                        // 重新开始BGM
                        setTimeout(() => startBgm(), 100);
                    });
                });
            });
        }

        // 跳过当前关卡（调试功能）
        function skipLevel() {
            if (!confirm('确定要跳过当前关卡吗？')) return;

            // 停止当前游戏的计时
            if (timerInterval) clearInterval(timerInterval);

            // 直接调用 nextLevel 进入下一关
            nextLevel();
        }

        // 退出游戏：停止计时/BGM，退出全屏，返回开始界面
        function exitGame() {
            stopBgm();
            if (timerInterval) clearInterval(timerInterval);
            gameOver = true;
            // 退出全屏
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            // 返回开始界面
            document.getElementById('gameContainer').classList.add('game-hidden');
            document.getElementById('startScreen').style.display = '';
            // 重置关卡
            level = 1;
            unlockedFish = [];
        }

        // 重新开始
        function restartGame() {
            stopBgm();
            level = 1;
            retryChanceUsed = false;
            unlockedFish = [];
            document.getElementById('level').textContent = `第 ${level} 关`;
            initGame();
            setTimeout(() => startBgm(), 100);
        }

        // 重试当前关卡
        function handleRetryLevel() {
            // 防止重复点击
            const retryBtn = document.getElementById('retryLevelBtn');
            retryBtn.disabled = true;
            retryBtn.style.display = 'none';

            // 隐藏失败弹窗
            document.getElementById('loseOverlay').classList.remove('show');

            // 重新加载当前关卡
            loadLevelResources(level, () => {
                initGame();
                // initGame之后再标记已用重试机会（第二关及以后）
                if (level >= 2) {
                    retryChanceUsed = true;
                }
                retryBtn.disabled = false;
                setTimeout(() => startBgm(), 100);
            });
        }

        // 显示图鉴
        function showCollection() {
            const collectionContent = document.getElementById('collectionContent');
            collectionContent.innerHTML = '';

            // 检测屏幕宽度，决定列数
            const isMobile = window.innerWidth < 600;
            const columns = isMobile ? 3 : 3;

            FISH_COLLECTION.forEach((fish, index) => {
                const isUnlocked = unlockedFish.includes(index);
                const card = document.createElement('div');
                card.style.cssText = `
                    background: ${isUnlocked ? 'rgba(255, 255, 255, 0.9)' : 'rgba(0, 0, 0, 0.3)'};
                    border: 2px solid ${isUnlocked ? fish.color : '#555'};
                    border-radius: 8px;
                    padding: 8px;
                    text-align: center;
                    opacity: ${isUnlocked ? '1' : '0.5'};
                    filter: ${isUnlocked ? 'none' : 'grayscale(100%)'};
                `;

                card.innerHTML = `
                    <div style="font-size: ${isMobile ? '32px' : '144px'}; margin-bottom: 5px;">${isUnlocked ? fish.emoji : '❓'}</div>
                    <div style="font-size: ${isMobile ? '12px' : '16px'}; color: #333; font-weight: bold;">${isUnlocked ? fish.name : '???'}</div>
                    <div style="font-size: ${isMobile ? '10px' : '12px'}; color: ${fish.color}; margin-top: 3px;">${isUnlocked ? fish.rarity : '??? 级'}</div>
                `;

                collectionContent.appendChild(card);
            });

            // 暂停游戏
            if (!gameOver && timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                isPaused = true;
            }

            document.getElementById('collectionOverlay').classList.add('show');
        }

        // 隐藏图鉴
        // 显示新手教程
        function showTutorial() {
            document.getElementById('tutorialOverlay').classList.add('show');
            isPaused = true;

            // 暂时隐藏所有其他 overlay，防止被遮挡
            document.querySelectorAll('.overlay:not(#tutorialOverlay)').forEach(el => {
                if (el.classList.contains('show')) {
                    el.classList.add('temp-hidden');
                    el.classList.remove('show');
                }
            });
        }

        // 隐藏新手教程
        function hideTutorial() {
            document.getElementById('tutorialOverlay').classList.remove('show');
            isPaused = false;
            timerInterval = setInterval(updateTimer, 1000);

            // 恢复被隐藏的 overlay
            document.querySelectorAll('.overlay.temp-hidden').forEach(el => {
                el.classList.remove('temp-hidden');
                el.classList.add('show');
            });

            // 检查是否需要显示过关弹窗（第一关完成但教程还没关闭的情况）
            if (window.showWinAfterTutorial) {
                window.showWinAfterTutorial = false;
                document.getElementById('winOverlay').classList.add('show');
                stopBgm();
                playWinSound();
            }
        }

        function hideCollection() {
            document.getElementById('collectionOverlay').classList.remove('show');

            // 恢复游戏
            if (!gameOver && isPaused && !timeOut) {
                timerInterval = setInterval(updateTimer, 1000);
                isPaused = false;
            }
        }

        // 保存图鉴图片
        function saveCollectionImage() {
            // 只保存已解锁的鱼类
            const unlockedFishes = FISH_COLLECTION.filter((fish, index) => unlockedFish.includes(index));
            
            if (unlockedFishes.length === 0) {
                alert('你还没有解锁任何鱼类，快去玩游戏吧！');
                return;
            }
            
            // 创建一个临时 canvas 来绘制图鉴
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // 设置画布大小
            const padding = 40;
            const titleHeight = 80;
            const cols = 3;
            const rows = Math.ceil(unlockedFishes.length / cols);
            const cardWidth = 150;
            const cardHeight = 200;
            const gap = 20;
            
            const width = padding * 2 + cols * cardWidth + (cols - 1) * gap;
            const height = padding * 2 + titleHeight + rows * cardHeight + (rows - 1) * gap;
            
            canvas.width = width;
            canvas.height = height;
            
            // 绘制背景
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制边框
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 4;
            ctx.strokeRect(padding, padding, width - padding * 2, height - padding * 2);
            
    // 绘制标题
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 36px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🐠 我什么鱼鱼图鉴', width / 2, padding + 60);
            
            // 只绘制已解锁的图鉴卡片
            unlockedFishes.forEach((fish, index) => {
                const col = index % cols;
                const row = Math.floor(index / cols);
                
                const x = padding + col * (cardWidth + gap);
                const y = padding + titleHeight + row * (cardHeight + gap);
                
                // 绘制卡片背景
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.fillRect(x, y, cardWidth, cardHeight);
                
                // 绘制卡片边框
                ctx.strokeStyle = fish.color;
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, cardWidth, cardHeight);
                
                // 绘制 emoji
                ctx.font = '72px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(fish.emoji, x + cardWidth / 2, y + 100);
                
                // 绘制名字
                ctx.fillStyle = '#333';
                ctx.font = 'bold 16px Arial';
                ctx.fillText(fish.name, x + cardWidth / 2, y + 140);
                
                // 绘制稀有度
                ctx.fillStyle = fish.color;
                ctx.font = '14px Arial';
                ctx.fillText(fish.rarity, x + cardWidth / 2, y + 165);
            });
            
            // 转换为图片并下载
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = '你什么鱼鱼_我什么鱼鱼.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                alert('图鉴已保存到本地！');
            });
        }

        // 启动游戏（等待用户点击开始）
    </script>
</body>
</html>
