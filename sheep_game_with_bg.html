<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你什么鱼鱼 - 网页版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: data:image/jpeg;base64, center center / cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 900px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(3px);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
        }

        .header h1 {
            color: white;
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            color: white;
            font-size: 18px;
            margin-top: 10px;
        }

        .game-board {
            flex: 1;
            position: relative;
            background: rgba(0, 100, 150, 0.3);
            border-radius: 15px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .card-slot {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 15px;
            min-height: 90px;
            background: rgba(0, 80, 120, 0.4);
            border-radius: 15px;
            margin-bottom: 10px;
            border: 3px solid rgba(100, 200, 255, 0.5);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .slot-placeholder {
            width: 85px;
            height: 72px;
            background: rgba(100, 200, 255, 0.2);
            border: 2px dashed rgba(100, 200, 255, 0.6);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            color: rgba(100, 200, 255, 0.5);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .slot-placeholder.matched {
            animation: matchPop 0.3s ease-out forwards;
        }

        .card {
            width: 85px;
            height: 72px;
            background: linear-gradient(145deg, #f5f5dc 0%, #e8e8c8 100%);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            margin: 0;
            user-select: none;
            border: 2px solid #8b7355;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: brightness(0.7);
        }

        .card.matched {
            animation: matchPop 0.3s ease-out forwards;
        }

        @keyframes matchPop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); }
            100% { transform: scale(0); opacity: 0; }
        }

        .pile-card {
            position: absolute;
            cursor: pointer;
            transition: all 0.15s;
        }

        .pile-card:hover:not(.disabled) {
            transform: scale(1.1);
            z-index: 1000 !important;
        }

        .pile-card.disabled {
            pointer-events: none;
            filter: brightness(0.5);
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00a8cc 0%, #006994 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 105, 148, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 105, 148, 0.6);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
            border-radius: 15px;
        }

        .overlay.show {
            display: flex;
        }

        .overlay h2 {
            font-size: 48px;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .overlay .btn {
            margin-top: 20px;
        }

        .win-text {
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .lose-text {
            color: #ff6b6b;
        }

        .level {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }

        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .start-screen h1 {
            font-size: 60px;
            color: #ffd700;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .start-screen p {
            color: white;
            font-size: 20px;
            margin-bottom: 40px;
        }

        .start-btn {
            font-size: 28px;
            padding: 20px 60px;
            background: linear-gradient(145deg, #ffd700 0%, #ff8c00 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.6);
        }

        .game-hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- 开始界面 -->
    <div class="start-screen" id="startScreen">
        <h1>🐠 你什么鱼鱼</h1>
        <p>消除鱼群，解锁图鉴，挑战更高关卡！</p>
        <button class="start-btn" onclick="startGame()">🎮 游戏开始</button>
    </div>

    <!-- 游戏容器 -->
    <div class="game-container game-hidden" id="gameContainer">
        <div class="header">
            <h1>🐠 你什么鱼鱼</h1>
            <div class="level" id="level">第 1 关</div>
            <div class="stats">
                <span>⏱️ <span id="time">28s</span></span>
                <span>🐠 <span id="moves">0</span></span>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <!-- 卡牌堆叠区域 -->
        </div>

        <div class="card-slot" id="cardSlot">
            <!-- 已选择的卡牌 -->
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="showCollection()">📖 图鉴</button>
            <button class="btn btn-primary" onclick="restartGame()">🔄 重新开始</button>
        </div>

        <!-- 胜利弹窗 -->
        <div class="overlay" id="winOverlay">
            <h2 class="win-text">🎉 恭喜过关！</h2>
            <p style="color: white; font-size: 18px;" id="winStats"></p>
            <button class="btn btn-primary" onclick="nextLevel()">下一关 ➡️</button>
        </div>

        <!-- 失败弹窗 -->
        <div class="overlay" id="loseOverlay">
            <h2 class="lose-text">😢 槽位满了</h2>
            <p style="color: white; font-size: 18px;">不要气馁，再试一次！</p>
            <button class="btn btn-primary" onclick="restartGame()">🔄 重新挑战</button>
        </div>

        <!-- 图鉴弹窗 -->
        <div class="overlay" id="collectionOverlay">
            <h2 style="color: #ffd700; font-size: 28px; margin-bottom: 15px;">🐠 我什么鱼鱼</h2>
            <div id="collectionContent" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-height: 50vh; overflow-y: auto; padding: 15px;"></div>
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
                <button class="btn btn-primary" onclick="saveCollectionImage()">💾 保存图鉴</button>
                <button class="btn btn-primary" onclick="hideCollection()">❌ 关闭</button>
            </div>
        </div>
    </div>

        function initGame() {
            cards = [];

        // 生成卡牌
        function generateCards() {
            const board = document.getElementById('gameBoard');
            const boardWidth = board.offsetWidth - 20;
            const boardHeight = board.offsetHeight - 20;

            // 根据关卡增加难度
            const cardCount = Math.min(24 + level * 6, 60);
            // 第一关至少 3 种牌
            const typesCount = Math.min(3 + Math.floor(level / 2), CARD_TYPES.length);

            // 确保总卡牌数是 3 的倍数
            const adjustedCardCount = Math.floor(cardCount / 3) * 3;

            // 生成卡牌组（确保每种类型都是 3 的倍数）
            let cardTypes = [];

            // 第一关使用特殊鱼（海星、寄居蟹、章鱼）
            if (level === 1) {
                // 确保每种鱼的数量相同
                const fishPerType = adjustedCardCount / 3;
                for (let fishIdx = 0; fishIdx < 3; fishIdx++) {
                    for (let j = 0; j < fishPerType; j++) {
                        cardTypes.push(LEVEL1_SPECIAL_FISH[fishIdx].emoji);
                    }
                }
            } else {
                // 其他关卡使用 emoji
                const tripletsPerType = Math.floor(adjustedCardCount / 3 / typesCount);
                const extraTriplets = (adjustedCardCount / 3) % typesCount;

                // 先平均分配
                for (let i = 0; i < typesCount; i++) {
                    const count = tripletsPerType + (i < extraTriplets ? 1 : 0);
                    for (let j = 0; j < count * 3; j++) {
                        cardTypes.push(CARD_TYPES[i]);
                    }
                }
            }

            // 打乱
            cardTypes.sort(() => Math.random() - 0.5);

            // 创建卡牌对象并分层
            cards = cardTypes.map((type, index) => ({
                id: index,
                type: type,
                x: 0,
                y: 0,
                z: 0,
                disabled: false
            }));

            // 分层排列卡牌
            arrangeCardsLayered();
        }

            // 分层排列卡牌
        function arrangeCardsLayered() {
            const board = document.getElementById('gameBoard');
            const boardWidth = board.offsetWidth;
            const boardHeight = board.offsetHeight;

            let cardIndex = 0;
            const layers = Math.ceil(cards.length / 12);

            for (let layer = 0; layer < layers && cardIndex < cards.length; layer++) {
                const cardsInLayer = Math.min(12, cards.length - cardIndex);
                const layerOffset = layer * 8;

                // 计算每层的卡牌排列
                const rowsThisLayer = Math.ceil(cardsInLayer / 4);
                const colsThisLayer = Math.min(4, cardsInLayer);

                // 计算居中偏移
                const totalWidth = (colsThisLayer - 1) * 95 + CARD_WIDTH;
                const totalHeight = (rowsThisLayer - 1) * 82 + CARD_HEIGHT;
                const offsetX = (boardWidth - totalWidth) / 2;
                const offsetY = (boardHeight - totalHeight) / 2;

                for (let row = 0; row < rowsThisLayer && cardIndex < cards.length; row++) {
                    for (let col = 0; col < 4 && cardIndex < cards.length; col++) {
                        if (cardIndex >= cards.length) break;

                        cards[cardIndex].x = offsetX + col * 95 + layerOffset;
                        cards[cardIndex].y = offsetY + row * 82 + layerOffset;
                        cards[cardIndex].z = layer;

                        cardIndex++;
                    }
                }
            }

            // 计算每张卡牌是否被遮挡
            updateCardDisabled();
        }

        // 更新卡牌遮挡状态
        function updateCardDisabled() {
            for (let i = 0; i < cards.length; i++) {
                const card = cards[i];
                card.disabled = false;

                // 检查是否有更高层的卡牌遮挡
                for (let j = 0; j < cards.length; j++) {
                    if (i === j) continue;
                    const other = cards[j];

                    if (other.z > card.z) {
                        const overlapX = Math.abs(other.x - card.x) < CARD_WIDTH * 0.7;
                        const overlapY = Math.abs(other.y - card.y) < CARD_HEIGHT * 0.7;

                        if (overlapX && overlapY) {
                            card.disabled = true;
                            break;
                        }
                    }
                }
            }
        }

        // 渲染卡牌
        function renderCards() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';

            cards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card pile-card';
                cardEl.id = `card-${card.id}`;
                cardEl.style.width = `${CARD_WIDTH}px`;
                cardEl.style.height = `${CARD_HEIGHT}px`;
                cardEl.style.left = `${card.x}px`;
                cardEl.style.top = `${card.y}px`;
                cardEl.style.zIndex = card.z;

                // 第一关使用图片，其他关卡使用emoji
                if (level === 1) {
                    const fish = LEVEL1_SPECIAL_FISH.find(f => f.emoji === card.type);
                    if (fish && fish.image) {
                        cardEl.innerHTML = `<img src="${fish.image}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:fill;" alt="${fish.name}">`;
                    } else {
                        cardEl.textContent = card.type;
                    }
                } else {
                    cardEl.textContent = card.type;
                }

                if (card.disabled) {
                    cardEl.classList.add('disabled');
                }

                cardEl.addEventListener('click', () => selectCard(card));
                board.appendChild(cardEl);
            });
        }

        // 选择卡牌
        function selectCard(card) {
            if (gameOver) return;
            if (isPaused) return; // 暂停时不能操作
            if (card.disabled) return;
            const currentSlotSize = level >= 5 ? 3 : 4;
            if (slotCards.length >= currentSlotSize) return;

            // 移除卡牌
            const cardEl = document.getElementById(`card-${card.id}`);
            cardEl.remove();
            cards = cards.filter(c => c.id !== card.id);

            // 更新遮挡状态
            updateCardDisabled();
            renderCards();

            // 添加到槽位
            slotCards.push(card);
            moves++;
            document.getElementById('moves').textContent = moves;

            renderSlot();
            checkMatch();
        }

        // 渲染槽位
        function renderSlot() {
            const slot = document.getElementById('cardSlot');
            slot.innerHTML = '';

            // 根据关卡确定槽位数量
            const currentSlotSize = level >= 5 ? 3 : 4;

            // 先渲染空槽位占位符
            for (let i = 0; i < currentSlotSize; i++) {
                const placeholder = document.createElement('div');
                placeholder.className = 'slot-placeholder';
                placeholder.dataset.index = i;
                slot.appendChild(placeholder);
            }

            // 渲染卡牌（替换占位符）
            slotCards.forEach((card, index) => {
                const placeholders = slot.querySelectorAll('.slot-placeholder');
                const targetPlaceholder = placeholders[index];

                if (targetPlaceholder) {
                    targetPlaceholder.style.background = 'linear-gradient(145deg, #f5f5dc 0%, #e8e8c8 100%)';
                    targetPlaceholder.style.border = '2px solid #8b7355';
                    targetPlaceholder.style.color = 'black';

                    // 第一关使用图片，其他关卡使用emoji
                    if (level === 1) {
                        const fish = LEVEL1_SPECIAL_FISH.find(f => f.emoji === card.type);
                        if (fish && fish.image) {
                            targetPlaceholder.innerHTML = `<img src="${fish.image}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:fill;" alt="${fish.name}">`;
                        } else {
                            targetPlaceholder.textContent = card.type;
                            targetPlaceholder.style.fontSize = '45px';
                            targetPlaceholder.style.fontWeight = '900';
                        }
                    } else {
                        targetPlaceholder.textContent = card.type;
                        targetPlaceholder.style.fontSize = '45px';
                        targetPlaceholder.style.fontWeight = '900';
                    }
                }
            });
        }

        // 检查匹配
        function checkMatch() {
            // 统计每种类型的数量
            const typeCount = {};
            slotCards.forEach(card => {
                typeCount[card.type] = (typeCount[card.type] || 0) + 1;
            });

            // 找到可以消除的类型
            const toRemove = [];
            for (const type in typeCount) {
                if (typeCount[type] >= 3) {
                    let count = 0;
                    for (let i = slotCards.length - 1; i >= 0; i--) {
                        if (slotCards[i].type === type) {
                            toRemove.push(i);
                            count++;
                            if (count >= 3) break;
                        }
                    }
                }
            }

            // 消除匹配的卡牌（从后往前删除）
            toRemove.sort((a, b) => b - a);
            const placeholders = document.querySelectorAll('.slot-placeholder');
            toRemove.forEach(index => {
                if (placeholders[index]) {
                    placeholders[index].classList.add('matched');
                }
            });

            setTimeout(() => {
                toRemove.forEach(index => {
                    slotCards.splice(index, 1);
                });
                renderSlot();
                checkGameState();
            }, 300);
        }

        // 检查游戏状态
        function checkGameState() {
            // 检查是否胜利
            if (cards.length === 0 && slotCards.length === 0) {
                gameOver = true;
                clearInterval(timerInterval);

                // 解锁新鱼类
                // 第一关解锁前3种鱼（海星、寄居蟹、章鱼），其他关卡按关卡解锁
                const fishIndex = level === 1 ? Math.floor(Math.random() * 3) : Math.min(level - 1, FISH_COLLECTION.length - 1);
                if (!unlockedFish.includes(fishIndex)) {
                    unlockedFish.push(fishIndex);
                }

                // 更新胜利弹窗
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                const newFish = FISH_COLLECTION[fishIndex];
                document.getElementById('winStats').innerHTML =
                    `用时: ${minutes}:${seconds.toString().padStart(2, '0')} | 移动次数: ${moves}<br>
                    <span style="color: #ffd700; font-size: 20px;">✨ 解锁新鱼：${newFish.emoji} ${newFish.name} (${newFish.rarity})</span>`;
                document.getElementById('winOverlay').classList.add('show');
                return;
            }

            // 检查是否失败（槽位满了且没有可消除的）
            const currentSlotSize = level >= 5 ? 3 : 4;
            if (slotCards.length >= currentSlotSize) {
                const typeCount = {};
                slotCards.forEach(card => {
                    typeCount[card.type] = (typeCount[card.type] || 0) + 1;
                });
                const canMatch = Object.values(typeCount).some(count => count >= 3);
                if (!canMatch) {
                    gameOver = true;
                    clearInterval(timerInterval);
                    document.getElementById('loseOverlay').classList.add('show');
                }
            }
        }

        // 更新计时器
        function updateTimer() {
            if (gameOver) return;
            const elapsed = Math.floor((Date.now() - startTime) / 1000);

            // 计算当前关卡的时间限制
            const timeLimit = Math.max(TIME_LIMIT_BASE - (level - 1), 10);

            // 检查时间限制
            if (elapsed >= timeLimit) {
                gameOver = true;
                timeOut = true;
                clearInterval(timerInterval);
                // 更新失败弹窗内容
                document.querySelector('#loseOverlay h2').textContent = '⏰ 时间已耗尽！';
                document.querySelector('#loseOverlay p').textContent = `${timeLimit}秒内完成挑战，再试一次！`;
                document.getElementById('loseOverlay').classList.add('show');
                return;
            }

            // 显示倒计时
            const remaining = timeLimit - elapsed;
            document.getElementById('time').textContent =
                `${remaining.toString().padStart(2, '0')}s`;
            // 时间少于 5 秒时变红
            document.getElementById('time').style.color = remaining <= 5 ? '#ff6b6b' : 'white';
        }

        // 开始游戏（从开始界面）
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameContainer').classList.remove('game-hidden');
            initGame();
        }

        // 重新开始
        function restartGame() {
            level = 1;
            unlockedFish = [];
            document.getElementById('level').textContent = `第 ${level} 关`;
            initGame();
        }

        // 下一关
        function nextLevel() {
            level++;
            document.getElementById('level').textContent = `第 ${level} 关`;
            initGame();
        }

        // 显示图鉴
        function showCollection() {
            const collectionContent = document.getElementById('collectionContent');
            collectionContent.innerHTML = '';

            // 检测屏幕宽度，决定列数
            const isMobile = window.innerWidth < 600;
            const columns = isMobile ? 3 : 3;

            FISH_COLLECTION.forEach((fish, index) => {
                const isUnlocked = unlockedFish.includes(index);
                const card = document.createElement('div');
                card.style.cssText = `
                    background: ${isUnlocked ? 'rgba(255, 255, 255, 0.9)' : 'rgba(0, 0, 0, 0.3)'};
                    border: 2px solid ${isUnlocked ? fish.color : '#555'};
                    border-radius: 8px;
                    padding: 8px;
                    text-align: center;
                    opacity: ${isUnlocked ? '1' : '0.5'};
                    filter: ${isUnlocked ? 'none' : 'grayscale(100%)'};
                `;

                card.innerHTML = `
                    <div style="font-size: ${isMobile ? '32px' : '144px'}; margin-bottom: 5px;">${isUnlocked ? fish.emoji : '❓'}</div>
                    <div style="font-size: ${isMobile ? '12px' : '16px'}; color: #333; font-weight: bold;">${isUnlocked ? fish.name : '???'}</div>
                    <div style="font-size: ${isMobile ? '10px' : '12px'}; color: ${fish.color}; margin-top: 3px;">${isUnlocked ? fish.rarity : '??? 级'}</div>
                `;

                collectionContent.appendChild(card);
            });

            // 暂停游戏
            if (!gameOver && timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                isPaused = true;
            }

            document.getElementById('collectionOverlay').classList.add('show');
        }

        // 隐藏图鉴
        function hideCollection() {
            document.getElementById('collectionOverlay').classList.remove('show');

            // 恢复游戏
            if (!gameOver && isPaused && !timeOut) {
                timerInterval = setInterval(updateTimer, 1000);
                isPaused = false;
            }
        }

        // 保存图鉴图片
        function saveCollectionImage() {
            // 只保存已解锁的鱼类
            const unlockedFishes = FISH_COLLECTION.filter((fish, index) => unlockedFish.includes(index));
            
            if (unlockedFishes.length === 0) {
                alert('你还没有解锁任何鱼类，快去玩游戏吧！');
                return;
            }
            
            // 创建一个临时 canvas 来绘制图鉴
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // 设置画布大小
            const padding = 40;
            const titleHeight = 80;
            const cols = 3;
            const rows = Math.ceil(unlockedFishes.length / cols);
            const cardWidth = 150;
            const cardHeight = 200;
            const gap = 20;
            
            const width = padding * 2 + cols * cardWidth + (cols - 1) * gap;
            const height = padding * 2 + titleHeight + rows * cardHeight + (rows - 1) * gap;
            
            canvas.width = width;
            canvas.height = height;
            
            // 绘制背景
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制边框
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 4;
            ctx.strokeRect(padding, padding, width - padding * 2, height - padding * 2);
            
    // 绘制标题
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 36px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🐠 我什么鱼鱼图鉴', width / 2, padding + 60);
            
            // 只绘制已解锁的图鉴卡片
            unlockedFishes.forEach((fish, index) => {
                const col = index % cols;
                const row = Math.floor(index / cols);
                
                const x = padding + col * (cardWidth + gap);
                const y = padding + titleHeight + row * (cardHeight + gap);
                
                // 绘制卡片背景
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.fillRect(x, y, cardWidth, cardHeight);
                
                // 绘制卡片边框
                ctx.strokeStyle = fish.color;
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, cardWidth, cardHeight);
                
                // 绘制 emoji
                ctx.font = '72px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(fish.emoji, x + cardWidth / 2, y + 100);
                
                // 绘制名字
                ctx.fillStyle = '#333';
                ctx.font = 'bold 16px Arial';
                ctx.fillText(fish.name, x + cardWidth / 2, y + 140);
                
                // 绘制稀有度
                ctx.fillStyle = fish.color;
                ctx.font = '14px Arial';
                ctx.fillText(fish.rarity, x + cardWidth / 2, y + 165);
            });
            
            // 转换为图片并下载
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = '你什么鱼鱼_我什么鱼鱼.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                alert('图鉴已保存到本地！');
            });
        }

        // 启动游戏
        initGame();
    </script>
</body>
